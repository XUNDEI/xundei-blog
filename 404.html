
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - xundei's blog</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --primary-color: #4285F4;
            --light-text: #fff;
            --transition: all 0.3s ease;
            --blur-amount: 12px;
            --glow-color: rgba(66, 133, 244, 0.7);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
            /* 默认蓝白渐变背景（最终兜底） */
            background-image: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        /* 仅在背景图片加载后覆盖渐变，但保留动态背景 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        .error-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 20px;
            text-align: center;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 50px 40px;
            transition: var(--transition);
            color: var(--light-text);
        }
        .glass-card:hover {
            box-shadow: 0 0 22px var(--glow-color), 0 0 45px rgba(66, 133, 244, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #a1c4fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-color);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .home-btn:hover {
            background: #2b6de0;
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--glow-color);
            letter-spacing: 0.5px;
        }
        @media (max-width: 768px) {
            .glass-card { padding: 35px 25px; }
            .error-code { font-size: 4rem; }
            .error-title { font-size: 1.5rem; }
            .error-message { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="glass-card">
            <div class="error-code">404</div>
            <h1 class="error-title">你来到了一片未知的领域</h1>
            <p class="error-message">保持好奇心是好事<br>但不是用在这里啊喂</p>
            <a href="/" class="home-btn">
                <i class="fas fa-home"></i> 返回首页
            </a>
        </div>
    </div>

    <script>
        // 壁纸加载逻辑
        async function loadWallpapers() {
            try {
                const response = await axios.get('./wallpaper.json', { timeout: 10000 });
                const wallpapersData = response.data;
                if (wallpapersData && wallpapersData.length > 0) {
                    const randomEntry = wallpapersData[Math.floor(Math.random() * wallpapersData.length)];
                    const wallpaperPath = randomEntry.path;
                    const timestamp = new Date().getTime();
                    let fullPath;
                    if (/^https?:\/\//i.test(wallpaperPath)) {
                        fullPath = `${wallpaperPath}?t=${timestamp}`;
                    } else {
                        fullPath = `./${wallpaperPath}?t=${timestamp}`;
                    }
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            document.body.style.backgroundImage = `url(${fullPath})`;
                            resolve(true);
                        };
                        img.onerror = () => resolve(false);
                        img.src = fullPath;
                    });
                }
                return false;
            } catch (error) {
                return false;
            }
        }

        async function loadBingWallpaper() {
            const bingApis = [
                'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN',
                'https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1',
                'https://bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN'
            ];
            for (const api of bingApis) {
                try {
                    const res = await axios.get(api, { timeout: 8000 });
                    if (res.data && res.data.images && res.data.images[0]) {
                        const imgUrl = 'https://www.bing.com' + res.data.images[0].url;
                        document.body.style.backgroundImage = `url(${imgUrl})`;
                        return true;
                    }
                } catch (e) {
                    continue;
                }
            }
            return false;
        }

        async function load360Wallpaper() {
            // 360壁纸API（国内常用，返回图片直接URL，随机壁纸）
            const apiList = [
                'https://www.yumus.cn/api/?target=img&brand=360&type=3',
                'https://api.xygeng.cn/Bing/rand.php?type=json', // 备选
                'https://api.btstu.cn/sjbz/api.php?lx=dongman&format=images' // 备选
            ];
            for (const api of apiList) {
                try {
                    // 如果是直接返回图片的API，可以尝试fetch并判断Content-Type
                    const res = await axios.get(api, { timeout: 8000, responseType: 'blob' });
                    if (res.status === 200 && res.data.type.startsWith('image/')) {
                        const blobUrl = URL.createObjectURL(res.data);
                        document.body.style.backgroundImage = `url(${blobUrl})`;
                        // 可选：稍后释放blob URL，但没必要，因为页面一直存在
                        return true;
                    }
                    // 如果API返回的是json包含图片地址
                    try {
                        const text = await res.data.text();
                        const json = JSON.parse(text);
                        if (json.imgurl || json.url) {
                            const imgUrl = json.imgurl || json.url;
                            document.body.style.backgroundImage = `url(${imgUrl})`;
                            return true;
                        }
                    } catch (e) {
                        // 忽略解析错误
                    }
                } catch (e) {
                    continue;
                }
            }
            return false;
        }

        (async function initWallpaper() {
            // 第一层：自定义壁纸库
            let wallOk = false;
            try {
                wallOk = await loadWallpapers();
            } catch (e) {
                console.warn('自定义壁纸加载异常', e);
            }
            // 第二层：Bing 每日壁纸
            if (!wallOk) {
                try {
                    wallOk = await loadBingWallpaper();
                } catch (e) {
                    console.warn('Bing壁纸加载异常', e);
                }
            }
            // 第三层：360 壁纸
            if (!wallOk) {
                try {
                    wallOk = await load360Wallpaper();
                } catch (e) {
                    console.warn('360壁纸加载异常', e);
                }
            }
            // 如果所有壁纸都失败，保持默认的蓝白渐变背景（已在CSS中定义）
            if (!wallOk) {
                console.log('使用默认蓝白渐变背景');
                // body的背景已通过CSS设置为蓝白渐变，无需额外操作
            }
        })();
    </script>
</body>
</html>
