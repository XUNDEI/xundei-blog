<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ARTICLE_TITLE}} - xundei's blog</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <meta name="keywords" content="{{ARTICLE_TAGS_STR}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <meta property="og:title" content="{{OG_TITLE}}">
    <meta property="og:description" content="{{OG_DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{OG_URL}}">
    <meta property="og:site_name" content="xundei's blog">
    <meta name="twitter:card" content="summary">
    <script type="application/ld+json">{{JSON_LD}}</script>
    <link rel="preload" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"></noscript>
    <style>
        /* ========== 文章页链接样式 ========== */
        .article-full-content a:not(:has(img)) {
            text-decoration: none;
            position: relative;
            color: #b8d4fe;
            transition: color 0.3s ease, background 0.3s ease;
            padding: 0 2px;
            border-radius: 2px;
            background: transparent;
            word-break: break-all;
        }
        .article-full-content a:not(:has(img)):hover {
            color: #ffffff;
            background: rgba(66, 133, 244, 0.25);
        }
        .article-full-content a:not(:has(img))::before {
            content: none !important;
        }
        .article-full-content a:not(:has(img))::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #b8d4fe, #d4e8fc);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .article-full-content a:not(:has(img)):hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .toc-list a {
            color: rgba(255, 255, 255, 0.8) !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
            text-decoration: none !important;
        }
        .toc-list a:hover {
            color: var(--primary-color) !important;
            transform: translateX(5px) !important;
            text-decoration: none !important;
        }
        .toc-list a::before,
        .toc-list a::after {
            content: none !important;
        }
        .link-confirm a {
            color: #b8d4fe !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }
        .link-confirm a::before,
        .link-confirm a::after {
            content: none !important;
        }
        .article-footer a {
            color: #b8d4fe !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .article-footer a::before,
        .article-footer a::after {
            content: none !important;
        }

        /* ========== CSS 变量 ========== */
        :root {
            --primary-color: #5B9CF5;
            --primary-glow: rgba(91, 156, 245, 0.6);
            --text-color: #333;
            --light-text: #fff;
            --transition: all 0.3s ease;
            --code-bg: #1a1d24;
            --code-copy-bg: rgba(255, 255, 255, 0.08);
            --code-copy-hover: rgba(255, 255, 255, 0.18);
            --success-color: #4CAF50;
            --error-color: #f44336;
            --scrollbar-width: 10px;
            --container-radius: 20px;
            --glass-radius: 16px;

            --aurora-gradient: linear-gradient(135deg, #B8D8E3 0%, #D4C5D9 50%, #E8D5D0 100%);
            --aurora-primary: #7BA7BC;
            --aurora-secondary: #C4A6C2;
        }

        body.theme-evening {
            --aurora-gradient: linear-gradient(135deg, #F4C4A8 0%, #C9A0B6 50%, #5B6D8A 100%);
            --aurora-primary: #E2B49A;
            --aurora-secondary: #B08AA3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
            background-color: transparent;
            background-image: none;
        }
        body::before {
            display: none;
        }

        /* ========== 极光背景 ========== */
        .aurora-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: var(--aurora-gradient);
            transition: opacity 0.8s ease;
            opacity: 1;
            will-change: opacity;
        }
        .aurora-background.fade-out {
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .aurora-background.hidden {
            display: none;
        }

        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            will-change: transform;
            mix-blend-mode: screen;
        }
        .aurora-orb-1 {
            width: min(600px, 80vw); height: min(600px, 80vw);
            background: var(--aurora-primary); opacity: 0.35; filter: blur(120px);
            left: 10%; top: 5%; animation: orb1-drift 22s ease-in-out infinite;
        }
        .aurora-orb-2 {
            width: min(500px, 65vw); height: min(500px, 65vw);
            background: var(--aurora-secondary); opacity: 0.28; filter: blur(100px);
            right: 5%; bottom: 10%; animation: orb2-drift 26s ease-in-out infinite;
        }
        .aurora-orb-3 {
            width: min(450px, 55vw); height: min(450px, 55vw);
            background: var(--aurora-primary); opacity: 0.22; filter: blur(130px);
            left: 40%; top: 40%; animation: orb3-drift 30s ease-in-out infinite;
        }
        .aurora-orb-4 {
            width: min(300px, 40vw); height: min(300px, 40vw);
            background: var(--aurora-secondary); opacity: 0.25; filter: blur(80px);
            left: 55%; top: 15%; animation: orb4-drift 18s ease-in-out infinite;
        }

        @keyframes orb1-drift {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(10%, 8%) scale(1.15); }
            50% { transform: translate(5%, 15%) scale(0.9); }
            75% { transform: translate(8%, 3%) scale(1.08); }
            100% { transform: translate(0, 0) scale(1); }
        }
        @keyframes orb2-drift {
            0% { transform: translate(0, 0) scale(0.9); }
            25% { transform: translate(-5%, 5%) scale(1.12); }
            50% { transform: translate(-8%, -3%) scale(1); }
            75% { transform: translate(-3%, -8%) scale(1.08); }
            100% { transform: translate(0, 0) scale(0.9); }
        }
        @keyframes orb3-drift {
            0% { transform: translate(0, 0) scale(1.05); }
            25% { transform: translate(-10%, 5%) scale(0.88); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            75% { transform: translate(-5%, -3%) scale(0.95); }
            100% { transform: translate(0, 0) scale(1.05); }
        }
        @keyframes orb4-drift {
            0% { transform: translate(0, 0) scale(0.85); }
            25% { transform: translate(-10%, -5%) scale(1.1); }
            50% { transform: translate(5%, 5%) scale(0.95); }
            75% { transform: translate(-8%, 10%) scale(1.05); }
            100% { transform: translate(0, 0) scale(0.85); }
        }

        /* ========== 动态切换玻璃样式 ========== */
        body.glass-modern {
            --glass-bg: rgba(18, 26, 44, 0.38);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-border-glow: rgba(255, 255, 255, 0.18);
            --glass-shadow: 0 8px 48px rgba(0, 0, 0, 0.22), 0 2px 12px rgba(0, 0, 0, 0.12);
            --glass-shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.18), 0 1px 6px rgba(0, 0, 0, 0.10);
            --blur-amount: 22px;
            --blur-saturate: saturate(160%);
        }
        body.glass-modern .article-container {
            background: linear-gradient(175deg, rgba(255,255,255,0.04) 0%, transparent 6%, transparent 60%, rgba(255,255,255,0.02) 70%, rgba(0,0,0,0.06) 100%), rgba(16,24,40,0.42);
            backdrop-filter: blur(24px) saturate(170%);
            -webkit-backdrop-filter: blur(24px) saturate(170%);
            border: 1px solid rgba(255,255,255,0.09);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(255,255,255,0.03), 0 0 0 1px rgba(255,255,255,0.03), 0 12px 60px rgba(0,0,0,0.28), 0 3px 16px rgba(0,0,0,0.14), 0 0 40px rgba(91,156,245,0.06);
        }
        /* 移除倾斜光泽动画 */
        body.glass-modern .article-container::after {
            display: none;
        }
        body.glass-modern .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) var(--blur-saturate);
            -webkit-backdrop-filter: blur(var(--blur-amount)) var(--blur-saturate);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 0 0 1px rgba(255,255,255,0.04), var(--glass-shadow-sm);
        }
        body.glass-modern .glass:hover {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 0 0 1px rgba(255,255,255,0.07), 0 8px 36px rgba(0,0,0,0.25), 0 0 24px rgba(91,156,245,0.12);
            border-color: var(--glass-border-glow);
        }

        body:not(.glass-modern) {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-border-glow: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            --glass-shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.12);
            --blur-amount: 12px;
            --blur-saturate: saturate(120%);
        }
        body:not(.glass-modern) .article-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }
        body:not(.glass-modern) .article-container::after {
            display: none;
        }
        body:not(.glass-modern) .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) var(--blur-saturate);
            -webkit-backdrop-filter: blur(var(--blur-amount)) var(--blur-saturate);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow-sm);
        }
        body:not(.glass-modern) .glass:hover {
            box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 0 16px rgba(255,255,255,0.2);
            border-color: var(--glass-border-glow);
        }

        .glass {
            border-radius: var(--glass-radius);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .glass::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 10%, transparent 88%, rgba(0,0,0,0.04) 100%);
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .article-container {
            max-width: 800px;
            margin: 60px auto 40px;
            border-radius: var(--container-radius);
            padding: 28px 32px;
            transition: all 0.4s ease, box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .article-container::before {
            content: '';
            position: absolute;
            top: 0; left: 10%;
            width: 80%; height: 1px;
            pointer-events: none; z-index: 2;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 15%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.25) 85%, transparent 100%);
            opacity: 0.7;
        }
        .article-container:hover {
            box-shadow: 0 16px 64px rgba(0,0,0,0.32), 0 4px 20px rgba(0,0,0,0.16), 0 0 56px rgba(91,156,245,0.10);
        }

        /* ========== 返回按钮（蓝色） ========== */
        .back-btn {
            position: fixed;
            top: 20px; left: 20px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px; height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary-glow);
            background: #4a8ae4;
        }

        .reading-time { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 0px; }
        .article-header { padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:30px; position:relative; z-index:2; }
        .article-title { font-size:2.2rem; color:var(--light-text); margin-bottom:15px; line-height:1.3; text-shadow:0 2px 12px rgba(0,0,0,0.3); }
        .article-meta { display:flex; justify-content:space-between; align-items:center; color:rgba(255,255,255,0.7); font-size:1rem; }
        .article-tags-bar { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; position:relative; z-index:2; }
        .article-tags-bar .article-tag { display:inline-block; padding:4px 14px; font-size:0.8rem; border-radius:50px; background:rgba(91,156,245,0.2); color:rgba(255,255,255,0.85); border:1px solid rgba(255,255,255,0.12); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:all 0.3s ease; text-decoration:none; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
        .article-tags-bar .article-tag:hover { background:rgba(91,156,245,0.38); border-color:rgba(255,255,255,0.25); transform:translateY(-2px); box-shadow:0 4px 16px rgba(91,156,245,0.3); }
        .article-full-content { color:rgba(255,255,255,0.9); line-height:1.8; font-size:1.1rem; word-wrap:break-word; overflow-wrap:break-word; word-break:break-word; position:relative; z-index:2; }
        .article-full-content h2 { font-size:1.7rem; margin:30px 0 20px 0; color:var(--light-text); position:relative; padding-left:16px; }
        .article-full-content h2::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:6px; height:60%; background:var(--primary-color); border-radius:3px; }
        .article-full-content h3 { font-size:1.4rem; margin:28px 0 18px 10px; color:rgba(255,255,255,0.93); position:relative; padding-left:15px; }
        .article-full-content h3::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:5px; height:55%; background:rgba(91,156,245,0.85); border-radius:3px; }
        .article-full-content h4 { font-size:1.2rem; margin:24px 0 14px 20px; color:rgba(255,255,255,0.85); position:relative; padding-left:14px; }
        .article-full-content h4::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:50%; background:rgba(91,156,245,0.7); border-radius:2px; }
        .article-full-content h5 { font-size:1.05rem; margin:20px 0 10px 30px; color:rgba(255,255,255,0.78); position:relative; padding-left:12px; }
        .article-full-content h5::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:40%; background:rgba(91,156,245,0.55); border-radius:2px; }
        .article-full-content h6 { font-size:0.95rem; margin:18px 0 8px 38px; color:rgba(255,255,255,0.7); position:relative; padding-left:10px; }
        .article-full-content h6::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:2px; height:35%; background:rgba(91,156,245,0.45); border-radius:2px; }
        .article-full-content p { margin-bottom:25px; }
        .article-full-content ul, .article-full-content ol { margin-bottom:25px; padding-left:30px; }
        .article-full-content ul li, .article-full-content ol li { margin-bottom:10px; padding-left:10px; }
        .article-full-content pre { position:relative; background:var(--code-bg); color:#dcdcdc; padding:50px 20px 20px; border-radius:12px; overflow-x:auto; margin:25px 0; font-size:0.95rem; line-height:1.6; box-shadow:0 8px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04); max-width:100%; box-sizing:border-box; border:1px solid rgba(255,255,255,0.06); }
        .article-full-content code { font-family:'Fira Code','Courier New',monospace; background:rgba(91,156,245,0.12); color:#d4e8fc; padding:3px 8px; border-radius:6px; font-size:0.95em; border:1px solid rgba(255,255,255,0.08); transition:all 0.3s ease; white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word; }
        .article-full-content pre code { background:none; padding:0; display:block; overflow-x:auto; color:inherit; border:none; border-radius:0; white-space:pre; }
        .article-full-content table { display:block; max-width:100%; overflow-x:auto; border-collapse:collapse; margin:25px 0; }
        .article-full-content th, .article-full-content td { padding:8px 12px; border:1px solid rgba(255,255,255,0.2); word-break:break-word; }
        .code-language { position:absolute; top:10px; left:10px; color:rgba(255,255,255,0.55); font-size:0.85rem; text-transform:uppercase; font-weight:500; letter-spacing:0.5px; }
        .copy-btn { position:absolute; top:10px; right:10px; background:var(--code-copy-bg); border:1px solid rgba(255,255,255,0.08); border-radius:6px; color:rgba(255,255,255,0.8); cursor:pointer; padding:6px 12px; font-size:0.85rem; transition:var(--transition); display:flex; align-items:center; gap:5px; z-index:2; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
        .copy-btn:hover { background:var(--code-copy-hover); color:white; box-shadow:0 0 14px var(--primary-glow); border-color:rgba(255,255,255,0.18); }
        .copy-btn.success { background:var(--success-color); color:white; border-color:transparent; }
        .copy-btn.error { background:var(--error-color); color:white; border-color:transparent; }
        .article-full-content img { max-width:100%; height:auto; box-sizing:border-box; border-radius:12px; margin:25px 0; box-shadow:0 8px 28px rgba(0,0,0,0.25); background:rgba(0,0,0,0.2); padding:10px; border:1px solid rgba(255,255,255,0.08); transition:all 0.3s ease, opacity 0.5s ease; display:block; }
        .article-full-content img.lazy-img { min-height:180px; opacity:0.35; background:rgba(0,0,0,0.35); border:1px dashed rgba(255,255,255,0.15); animation:placeholderPulse 2.5s ease-in-out infinite; }
        @keyframes placeholderPulse { 0%,100% { opacity:0.25 } 50% { opacity:0.5 } }
        .article-full-content img.lazy-loaded { opacity:1; animation:imgReveal 0.55s ease-out forwards; }
        @keyframes imgReveal { from { opacity:0.35; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
        .article-full-content img.lazy-error { min-height:120px; opacity:0.7; background:rgba(244,67,54,0.15); border:1px dashed rgba(244,67,54,0.4); }
        .article-full-content img:hover { box-shadow:0 0 28px var(--primary-glow), 0 12px 32px rgba(0,0,0,0.3); }
        .article-full-content blockquote { border-left:4px solid var(--primary-color); padding:12px 20px; margin:25px 0; background:rgba(91,156,245,0.08); border-radius:0 10px 10px 0; color:rgba(255,255,255,0.9); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }

        .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:1000; justify-content:center; align-items:center; animation:fadeIn 0.3s ease; }
        .lightbox img { max-width:90%; max-height:90%; border-radius:12px; box-shadow:0 0 40px var(--primary-glow); transition:transform 0.3s ease; }
        .lightbox-close, .lightbox-rotate-cw, .lightbox-rotate-ccw { position:absolute; top:20px; color:white; cursor:pointer; transition:all 0.3s ease; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
        .lightbox-close { right:30px; } .lightbox-rotate-cw { right:90px; } .lightbox-rotate-ccw { right:150px; }
        .lightbox-close:hover, .lightbox-rotate-cw:hover, .lightbox-rotate-ccw:hover { color:var(--primary-color); background:rgba(255,255,255,0.18); box-shadow:0 0 16px var(--primary-glow); border-color:rgba(255,255,255,0.25); }

        .toc-container { position:fixed; top:100px; right:30px; max-width:240px; max-height:70vh; overflow-y:auto; padding:20px; z-index:99; display:none; animation:slideInRight 0.3s ease; overscroll-behavior:contain; }
        .toc-toggle { position:fixed; top:100px; right:30px; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; transition:all 0.35s cubic-bezier(0.25,0.8,0.25,1.2); z-index:100; background: var(--primary-color); }
        .toc-toggle:hover { transform:scale(1.12); box-shadow:0 0 20px var(--primary-glow); }
        .toc-toggle.mobile-only { display:none; }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

    <script>
        (function() {
            function getAuroraTheme() {
                const hour = new Date().getHours();
                return (hour >= 18 || hour < 6) ? 'evening' : 'morning';
            }
            const currentTheme = getAuroraTheme();
            if (currentTheme === 'evening') document.body.classList.add('theme-evening');

            const auroraBg = document.getElementById('aurora-bg');
            function hideAuroraBackground() {
                if (!auroraBg || auroraBg.classList.contains('hidden')) return;
                auroraBg.classList.add('fade-out');
                setTimeout(() => { auroraBg.classList.add('hidden'); auroraBg.style.display = 'none'; }, 1200);
            }
            document.body.style.backgroundImage = 'none';

            const loadingErrors = [];
            let articleImageObserver = null, currentRotation = 0, loadingOverlayHidden = false, wallpaperResolved = false;

            async function simpleFetch(url, options = {}) {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                return response;
            }
            function showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div'); toast.className = `toast ${type}`;
                const progress = document.createElement('div'); progress.className = 'toast-progress';
                const msg = document.createElement('div'); msg.textContent = message;
                toast.appendChild(progress); toast.appendChild(msg);
                container.appendChild(toast);
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 400); }, 3000);
            }
            function updateLoadingProgress(percentage, subtext) {
                const bar = document.getElementById('loading-progress-bar');
                const sub = document.getElementById('loading-subtext');
                if (bar) bar.style.width = Math.min(percentage, 100) + '%';
                if (sub && subtext) sub.textContent = subtext;
            }
            function hideLoadingOverlay() {
                if (loadingOverlayHidden) return;
                loadingOverlayHidden = true;
                const overlay = document.getElementById('loading-overlay');
                if (!overlay) return;
                updateLoadingProgress(100, '加载完成˶>ᗜ<˶');
                overlay.classList.add('fade-out');
                setTimeout(() => { overlay.classList.add('hidden'); overlay.style.display = 'none'; }, 500);
            }
            function addLoadingError(msg) { loadingErrors.push(msg); }
            function flushLoadingErrors() {
                if (!loadingErrors.length) return;
                [...new Set(loadingErrors)].forEach(err => showToast(err, 'error'));
                loadingErrors.length = 0;
            }

            function loadImage(imgUrl) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        document.body.style.backgroundImage = 'url(' + imgUrl + ')';
                        hideAuroraBackground();
                        document.body.classList.remove('glass-modern');
                        resolve(true);
                    };
                    img.onerror = () => resolve(false);
                    img.src = imgUrl;
                    if (img.complete && img.naturalWidth > 0) {
                        document.body.style.backgroundImage = 'url(' + imgUrl + ')';
                        hideAuroraBackground();
                        document.body.classList.remove('glass-modern');
                        resolve(true);
                    }
                });
            }
            async function loadWallpaperFromConfig() {
                try {
                    const res = await simpleFetch('../wallpaper.json');
                    const data = await res.json();
                    if (data && data.length) {
                        const entry = data[Math.floor(Math.random() * data.length)];
                        let imgUrl = entry.path;
                        if (!/^https?:\/\//i.test(imgUrl)) imgUrl = '../' + imgUrl;
                        return await loadImage(imgUrl);
                    }
                } catch (e) { console.warn('壁纸配置加载失败:', e); }
                return false;
            }
            async function loadWallpaperBackground() {
                if (wallpaperResolved) return true;
                try { const r = await loadWallpaperFromConfig(); if (r) { wallpaperResolved = true; return true; } } catch (e) {}
                wallpaperResolved = true; return false;
            }

            function prepareArticleImagesForLazyLoading() {
                const images = document.querySelectorAll('.article-full-content img');
                if (!images.length) return false;
                images.forEach(img => {
                    if (img.complete && img.naturalWidth > 0) return;
                    const src = img.getAttribute('src');
                    if (src && !img.hasAttribute('data-src')) { img.setAttribute('data-src', src); img.removeAttribute('src'); img.classList.add('lazy-img'); }
                });
                return document.querySelectorAll('.article-full-content img[data-src]').length > 0;
            }
            function startArticleImageLazyLoading() {
                const lazy = document.querySelectorAll('.article-full-content img[data-src]');
                if (!lazy.length) return;
                if (articleImageObserver) articleImageObserver.disconnect();
                articleImageObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target, dataSrc = img.getAttribute('data-src');
                            if (dataSrc) {
                                img.src = dataSrc; img.removeAttribute('data-src');
                                img.onload = () => { img.classList.remove('lazy-img'); img.classList.add('lazy-loaded'); };
                                img.onerror = () => { img.classList.remove('lazy-img'); img.classList.add('lazy-error'); };
                            }
                            articleImageObserver.unobserve(img);
                        }
                    });
                }, { root: null, rootMargin: '250px', threshold: 0 });
                lazy.forEach(img => articleImageObserver.observe(img));
            }

            function preventTocScrollPropagation() {
                const tc = document.getElementById('toc-container');
                if (tc) tc.addEventListener('wheel', function(e) {
                    const scrollable = this.scrollHeight > this.clientHeight;
                    const atTop = this.scrollTop === 0, atBottom = this.scrollTop + this.clientHeight >= this.scrollHeight - 1;
                    if ((atTop && e.deltaY < 0) || (atBottom && e.deltaY > 0)) return;
                    if (scrollable) e.stopPropagation();
                }, { passive: false });
            }
            function addCopyButtonsToCodeBlocks() {
                document.querySelectorAll('.article-full-content pre').forEach(pre => {
                    const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                    const code = pre.querySelector('code'), lang = code.className.replace('language-', '') || 'code';
                    const label = document.createElement('span'); label.className = 'code-language'; label.textContent = lang;
                    pre.appendChild(label);
                    btn.addEventListener('click', () => {
                        navigator.clipboard.writeText(code.innerText).then(() => {
                            btn.innerHTML = '<i class="fas fa-check"></i> 已复制'; btn.classList.add('success');
                            showToast('代码已复制到剪贴板', 'success');
                            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> 复制'; btn.classList.remove('success'); }, 2000);
                        }).catch(() => {
                            btn.innerHTML = '<i class="fas fa-times"></i> 失败'; btn.classList.add('error');
                            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> 复制'; btn.classList.remove('error'); }, 2000);
                        });
                    });
                    pre.appendChild(btn);
                });
            }
            function handleImageClick(e) {
                const target = e.target;
                if (target.tagName === 'IMG' && target.closest('.article-full-content')) {
                    const src = target.src;
                    if (!src && target.hasAttribute('data-src')) return;
                    if (src && !target.closest('a')) {
                        const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img');
                        lbImg.src = src; lbImg.style.transform = 'rotate(0deg)'; currentRotation = 0; lb.style.display = 'flex';
                    }
                }
                if (target.tagName === 'IMG' && target.closest('a') && target.closest('.article-full-content')) {
                    e.preventDefault(); showLinkConfirm(target.closest('a').href);
                }
            }
            function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; hideLinkConfirm(); }
            function rotateCW() { const img = document.getElementById('lightbox-img'); if (img && document.getElementById('lightbox').style.display === 'flex') { currentRotation += 90; img.style.transform = `rotate(${currentRotation}deg)`; } }
            function rotateCCW() { const img = document.getElementById('lightbox-img'); if (img && document.getElementById('lightbox').style.display === 'flex') { currentRotation -= 90; img.style.transform = `rotate(${currentRotation}deg)`; } }
            function showLinkConfirm(url) {
                const el = document.getElementById('link-confirm'), linkEl = document.getElementById('link-url');
                linkEl.textContent = url; linkEl.href = url;
                el.style.display = 'block'; setTimeout(() => el.classList.add('show'), 10);
                document.getElementById('link-confirm-btn').onclick = () => { hideLinkConfirm(); window.open(url, '_blank'); };
            }
            function hideLinkConfirm() { const el = document.getElementById('link-confirm'); el.classList.remove('show'); setTimeout(() => { el.style.display = 'none'; }, 400); }
            function formatRelativeTime(d) { if(!d)return''; const n=new Date(),t=new Date(d),ms=n-t,m=Math.floor(ms/6e4),h=Math.floor(ms/36e5),day=Math.floor(ms/864e5); if(m<1)return'刚刚';if(m<60)return m+' 分钟前';if(h<24)return h+' 小时前';if(day<=30)return day+' 天前'; return t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-'+t.getDate().toString().padStart(2,'0'); }
            function displayLatestInfo() {
                const el = document.getElementById('article-latest'), timeEl = document.getElementById('article-latest-time');
                const s = el?.dataset.latest; if(s){ el.style.display='inline'; timeEl.textContent=formatRelativeTime(s); }
            }

            function generateTOC() {
                const toc = document.getElementById('toc-container'), list = document.getElementById('toc-list');
                const headings = document.querySelectorAll('.article-full-content h2,h3,h4,h5,h6');
                if(!headings.length){ toc.style.display='none'; document.getElementById('toc-toggle').style.display='none'; return; }
                if(window.innerWidth>1024) toc.style.display='block'; else toc.style.display='none';
                list.innerHTML='';
                headings.forEach((h,i)=>{ if(!h.id) h.id='heading-'+i; const li=document.createElement('li'); li.className='toc-'+h.tagName.toLowerCase(); li.dataset.id=h.id; const a=document.createElement('a'); a.href='#'+h.id; a.textContent=h.textContent; a.addEventListener('click',e=>{ e.preventDefault(); const t=document.getElementById(h.id); if(t) window.scrollTo({top:t.offsetTop-80,behavior:'smooth'}); if(window.innerWidth<=1024) toc.style.display='none'; }); li.appendChild(a); list.appendChild(li); });
            }
            function adjustTocPosition() {
                if(window.innerWidth<=1024)return; const tc=document.getElementById('toc-container'),ac=document.querySelector('.article-container');
                if(!tc||!ac||tc.style.display==='none')return; const ar=ac.getBoundingClientRect(),tw=tc.offsetWidth,mg=20,re=ar.right,vw=window.innerWidth,lt=re+mg,re2=lt+tw; let nr=vw-re2; nr=Math.max(-(tw-50),Math.min(nr,vw-10)); tc.style.right=nr+'px';
            }
            function updateProgressRing() {
                const c=document.getElementById('progress-circle'); if(!c)return; const st=window.scrollY,dh=document.documentElement.scrollHeight-window.innerHeight,pct=dh>0?Math.min(st/dh,1):0,circ=2*Math.PI*20; c.style.strokeDashoffset=circ*(1-pct);
            }
            function handleScroll() {
                document.getElementById('back-to-top').classList.toggle('visible', window.scrollY>300);
                highlightTOC(); updateProgressRing(); adjustTocPosition();
            }
            function highlightTOC() {
                const hs=document.querySelectorAll('.article-full-content h2,h3,h4,h5,h6'), items=document.querySelectorAll('.toc-list li');
                if(!hs.length)return; let cur=null; const sp=window.scrollY+100, wh=window.innerHeight, dh=document.documentElement.scrollHeight, atBottom=wh+window.scrollY>=dh-100;
                if(atBottom) cur=hs[hs.length-1];
                else for(let i=0;i<hs.length;i++){ const h=hs[i],t=h.offsetTop,b=t+h.offsetHeight; if((t<=sp&&b>=sp)||(i===hs.length-1&&t<=sp)){ cur=h; break; } if(t>sp){ cur=hs[Math.max(0,i-1)]; break; } }
                if(!cur&&hs.length) cur=hs[0];
                if(cur) items.forEach(item=>{ if(item.dataset.id===cur.id){ item.classList.add('active'); if(window.innerWidth>1024){ const tc=document.getElementById('toc-container'),it=item.offsetTop,ch=tc.clientHeight,ih=item.clientHeight; if(it<tc.scrollTop||it+ih>tc.scrollTop+ch) tc.scrollTop=it-ch/2+ih/2; } } else item.classList.remove('active'); });
            }
            async function loadPoetry() {
                const contentEl = document.getElementById('poetry-content');
                const authorEl = document.getElementById('poetry-author');
                try {
                    contentEl.textContent = '加载中...';
                    authorEl.textContent = '';
                    const response = await fetch('https://v1.jinrishici.com/all.json');
                    const data = await response.json();
                    if (data && data.content) {
                        contentEl.textContent = data.content;
                        authorEl.textContent = '—— ' + data.author;
                        // 加载成功，变为白色
                        contentEl.style.color = '#fff';
                        authorEl.style.color = '#ddd';
                    } else {
                        throw new Error('数据结构不符');
                    }
                } catch (e) {
                    contentEl.textContent = '加载失败';
                    authorEl.textContent = '';
                    contentEl.style.color = '#fff';
                    authorEl.style.color = '#ddd';
                }
            }
            function formatArticleDateToMonthDay() {
                const s=document.getElementById('article-date'); if(!s)return; const d=new Date(s.textContent.trim()); if(isNaN(d))return; s.textContent=(d.getMonth()+1)+'月'+d.getDate()+'日';
            }

            document.addEventListener('DOMContentLoaded', () => {
                updateLoadingProgress(10,'正在准备...');
                const lazy = prepareArticleImagesForLazyLoading();
                loadWallpaperBackground().then(ok => { if(!ok) addLoadingError('壁纸加载失败，已使用极光背景'); });
                updateLoadingProgress(55,'正在渲染文章...');
                if(lazy) startArticleImageLazyLoading();
                addCopyButtonsToCodeBlocks();
                const codes=document.querySelectorAll('pre code'); let idx=0;
                function highlightNext(){ const batch=2,end=Math.min(idx+batch,codes.length); for(let i=idx;i<end;i++) hljs.highlightElement(codes[i]); idx=end; if(idx<codes.length) requestAnimationFrame(highlightNext); }
                if(codes.length) requestAnimationFrame(highlightNext);
                generateTOC(); displayLatestInfo(); formatArticleDateToMonthDay();
                document.addEventListener('click', handleImageClick);
                window.addEventListener('scroll', handleScroll);
                let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ const tc=document.getElementById('toc-container'); if(window.innerWidth>1024){ tc.style.display='block'; adjustTocPosition(); } else tc.style.display=''; updateProgressRing(); },150); });
                document.getElementById('back-to-top').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
                document.getElementById('toc-toggle').addEventListener('click',()=>{ const tc=document.getElementById('toc-container'); if(tc.style.display==='block') tc.style.display='none'; else { tc.style.display='block'; highlightTOC(); const a=document.querySelector('.toc-list li.active'); if(a) a.scrollIntoView({behavior:'smooth',block:'center'}); } });
                preventTocScrollPropagation();
                document.getElementById('link-cancel').addEventListener('click',hideLinkConfirm);
                document.getElementById('lightbox-close').addEventListener('click',closeLightbox);
                document.getElementById('lightbox').addEventListener('click',ev=>{ if(ev.target===document.getElementById('lightbox')) closeLightbox(); });
                document.getElementById('lightbox-rotate-cw').addEventListener('click',rotateCW);
                document.getElementById('lightbox-rotate-ccw').addEventListener('click',rotateCCW);
                updateLoadingProgress(90,'即将完成...');
                loadPoetry(); document.getElementById('poetry-refresh-btn').addEventListener('click',loadPoetry);
                adjustTocPosition(); updateProgressRing();
                const footer=document.querySelector('#article-footer .footer-content');
                if(footer&&/保留所有权利/.test(footer.textContent)) footer.innerHTML='<span>作者保留此文章所有权利</span>';
                hideLoadingOverlay(); flushLoadingErrors();
            });
        })();
    </script>
</body>
</html>
