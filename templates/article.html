<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ARTICLE_TITLE}} - xundei's blog</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <meta property="og:title" content="{{OG_TITLE}}">
    <meta property="og:description" content="{{OG_DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{OG_URL}}">
    <meta property="og:site_name" content="xundei's blog">
    <meta name="twitter:card" content="summary">
    <script type="application/ld+json">{{JSON_LD}}</script>
    <link rel="preload" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"></noscript>
    <style>
        .article-full-content a:not(:has(img)) {
            text-decoration: none;
            position: relative;
            color: #a1c4fd;
            transition: color 0.3s ease, background 0.3s ease;
            padding: 0 2px;
            border-radius: 2px;
            background: transparent;
        }
        .article-full-content a:not(:has(img)):hover {
            color: #ffffff;
            background: rgba(66, 133, 244, 0.2);
        }
        .article-full-content a:not(:has(img))::before {
            content: none !important;
        }
        .article-full-content a:not(:has(img))::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .article-full-content a:not(:has(img)):hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .toc-list a {
            color: rgba(255, 255, 255, 0.8) !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }
        .toc-list a:hover {
            color: var(--primary-color) !important;
            transform: translateX(5px) !important;
        }
        .toc-list a::before,
        .toc-list a::after {
            content: none !important;
        }
        .link-confirm a {
            color: #a3c8ff !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }
        .link-confirm a::before,
        .link-confirm a::after {
            content: none !important;
        }
        .article-footer a {
            color: #a1c4fd !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .article-footer a::before,
        .article-footer a::after {
            content: none !important;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --primary-color: #4285F4;
            --text-color: #333;
            --light-text: #fff;
            --transition: all 0.3s ease;
            --blur-amount: 12px;
            --code-bg: #1e1e1e;
            --code-copy-bg: rgba(255, 255, 255, 0.1);
            --code-copy-hover: rgba(255, 255, 255, 0.2);
            --success-color: #4CAF50;
            --error-color: #f44336;
            --scrollbar-width: 10px;
            --glow-color: rgba(66, 133, 244, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
            background-color: #121212;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-overlay.hidden {
            display: none;
        }
        .loading-card {
            background: rgba(30, 60, 120, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 160, 240, 0.45);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25), 0 0 30px rgba(66, 133, 244, 0.35);
            padding: 35px 30px 25px;
            width: 320px;
            max-width: 85vw;
            text-align: center;
            transition: all 0.3s ease;
            animation: loadingPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes loadingPopIn {
            from { opacity: 0; transform: translateY(30px) scale(0.85); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .loading-card .loader {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 4px solid #5badf5;
            border-right: 4px solid #3d8ef7;
            animation: spin 0.9s linear infinite;
            margin-bottom: 18px;
        }
        .loading-card .loading-text {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .loading-card .loading-subtext {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 18px;
            min-height: 18px;
        }
        .loading-progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3d8ef7, #5badf5, #7dc8f8);
            background-size: 200% 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progressShimmer 2s linear infinite;
            box-shadow: 0 0 12px rgba(66, 150, 244, 0.5);
        }
        @keyframes progressShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            transition: var(--transition);
        }
        .reading-time {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0px;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--glow-color);
        }
        .article-container {
            max-width: 800px;
            margin: 60px auto 40px;
        }
        .article-header {
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        .article-title {
            font-size: 2.2rem;
            color: var(--light-text);
            margin-bottom: 15px;
            line-height: 1.3;
        }
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }
        .article-full-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1.1rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .article-full-content h2 {
            font-size: 1.7rem;
            margin: 30px 0 20px 0;
            color: var(--light-text);
            position: relative;
            padding-left: 16px;
        }
        .article-full-content h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 60%;
            background: var(--primary-color);
            border-radius: 3px;
        }
        .article-full-content h3 {
            font-size: 1.4rem;
            margin: 28px 0 18px 10px;
            color: rgba(255, 255, 255, 0.93);
            position: relative;
            padding-left: 15px;
        }
        .article-full-content h3::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 55%;
            background: rgba(66, 133, 244, 0.85);
            border-radius: 3px;
        }
        .article-full-content h4 {
            font-size: 1.2rem;
            margin: 24px 0 14px 20px;
            color: rgba(255, 255, 255, 0.85);
            position: relative;
            padding-left: 14px;
        }
        .article-full-content h4::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 50%;
            background: rgba(66, 133, 244, 0.7);
            border-radius: 2px;
        }
        .article-full-content h5 {
            font-size: 1.05rem;
            margin: 20px 0 10px 30px;
            color: rgba(255, 255, 255, 0.78);
            position: relative;
            padding-left: 12px;
        }
        .article-full-content h5::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 40%;
            background: rgba(66, 133, 244, 0.55);
            border-radius: 2px;
        }
        .article-full-content h6 {
            font-size: 0.95rem;
            margin: 18px 0 8px 38px;
            color: rgba(255, 255, 255, 0.7);
            position: relative;
            padding-left: 10px;
        }
        .article-full-content h6::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 35%;
            background: rgba(66, 133, 244, 0.45);
            border-radius: 2px;
        }
        .article-full-content p {
            margin-bottom: 25px;
        }
        .article-full-content ul,
        .article-full-content ol {
            margin-bottom: 25px;
            padding-left: 30px;
        }
        .article-full-content ul li,
        .article-full-content ol li {
            margin-bottom: 10px;
            padding-left: 10px;
        }
        .article-full-content pre {
            position: relative;
            background: var(--code-bg);
            color: #dcdcdc;
            padding: 50px 20px 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 25px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        .article-full-content code {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: rgba(66, 133, 244, 0.12);
            color: #c2e9fb;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.95em;
            border: 1px solid rgba(66, 133, 244, 0.2);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .article-full-content pre code {
            background: none;
            padding: 0;
            display: block;
            overflow-x: auto;
            color: inherit;
            border: none;
            border-radius: 0;
            white-space: pre;
        }
        .code-language {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--code-copy-bg);
            border: none;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            padding: 6px 12px;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }
        .copy-btn:hover {
            background: var(--code-copy-hover);
            color: white;
            box-shadow: 0 0 10px var(--glow-color);
        }
        .copy-btn.success {
            background: var(--success-color);
            color: white;
        }
        .copy-btn.error {
            background: var(--error-color);
            color: white;
        }
        .article-full-content img {
            max-width: 100%;
            height: auto;
            box-sizing: border-box;
            border-radius: 10px;
            margin: 25px 0;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease, opacity 0.5s ease;
            display: block;
        }
        .article-full-content img.lazy-img {
            min-height: 180px;
            opacity: 0.35;
            background: rgba(0, 0, 0, 0.35);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            animation: placeholderPulse 2.5s ease-in-out infinite;
        }
        @keyframes placeholderPulse {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.5; }
        }
        .article-full-content img.lazy-loaded {
            opacity: 1;
            animation: imgReveal 0.55s ease-out forwards;
        }
        @keyframes imgReveal {
            from { opacity: 0.35; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .article-full-content img.lazy-error {
            min-height: 120px;
            opacity: 0.7;
            background: rgba(244, 67, 54, 0.15);
            border: 1px dashed rgba(244, 67, 54, 0.4);
        }
        .article-full-content img:hover {
            box-shadow: 0 0 20px var(--glow-color);
        }
        .article-full-content blockquote {
            border-left: 4px solid var(--primary-color);
            padding: 10px 20px;
            margin: 25px 0;
            background: rgba(66, 133, 244, 0.1);
            border-radius: 0 8px 8px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(66, 133, 244, 0.5);
            transition: transform 0.3s ease;
        }
        .lightbox-close,
        .lightbox-rotate-cw,
        .lightbox-rotate-ccw {
            position: absolute;
            top: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .lightbox-close { right: 30px; }
        .lightbox-rotate-cw { right: 90px; }
        .lightbox-rotate-ccw { right: 150px; }
        .lightbox-close:hover,
        .lightbox-rotate-cw:hover,
        .lightbox-rotate-ccw:hover {
            color: var(--primary-color);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px var(--glow-color);
        }

        .toc-container {
            position: fixed;
            top: 100px;
            right: 30px;
            max-width: 240px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            z-index: 99;
            display: none;
            animation: slideInRight 0.3s ease;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            overscroll-behavior: contain;
        }
        .toc-toggle {
            position: fixed;
            top: 100px;
            right: 30px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .toc-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--glow-color);
        }
        .toc-toggle.mobile-only { display: none; }
        .toc-title {
            font-size: 1.2rem;
            color: var(--light-text);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .toc-list { list-style-type: none; padding-left: 15px; }
        .toc-list li {
            margin-bottom: 8px;
            line-height: 1.4;
            transition: all 0.3s ease;
            border-radius: 6px;
            padding: 4px 8px;
        }
        .toc-list li:hover {
            background: rgba(66, 133, 244, 0.1);
            transform: translateX(5px);
        }
        .toc-list li.active {
            background: rgba(66, 133, 244, 0.2);
            border-left: 3px solid var(--primary-color);
            padding-left: 12px;
        }
        .toc-list a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: var(--transition);
            display: block;
            padding: 3px 0;
        }
        .toc-list a:hover { color: var(--primary-color); }
        .toc-list .toc-h2 { font-weight: 600; padding-left: 0; }
        .toc-list .toc-h3 { font-weight: 400; padding-left: 15px; font-size: 0.95rem; }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: transparent;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            z-index: 98;
            box-shadow: none;
        }
        .back-to-top.visible { opacity: 1; }
        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--glow-color);
        }
        .back-to-top .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: rotate(-90deg);
        }
        .back-to-top .progress-ring-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 4;
        }
        .back-to-top .progress-ring-progress {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 125.66;
            stroke-dashoffset: 125.66;
            transition: stroke-dashoffset 0.15s linear;
            filter: drop-shadow(0 0 6px rgba(66,133,244,0.8));
        }
        .back-to-top .back-to-top-icon {
            position: relative;
            z-index: 1;
            font-size: 1rem;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .link-confirm {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            z-index: 1001;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            display: none;
        }
        .link-confirm.show { transform: translateY(0); opacity: 1; }
        .link-confirm p {
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }
        .link-confirm a {
            color: #a3c8ff;
            word-break: break-all;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }
        .link-confirm-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .link-confirm-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .link-confirm-btn.confirm { background: var(--primary-color); color: white; }
        .link-confirm-btn.confirm:hover { background: #3b78e7; box-shadow: 0 0 10px var(--glow-color); }
        .link-confirm-btn.cancel { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.9); }
        .link-confirm-btn.cancel:hover { background: rgba(255, 255, 255, 0.2); }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 300px;
        }
        .toast {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .toast.show { transform: translateX(0); }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.8);
            width: 100%;
            transform-origin: left;
            animation: progress 3s linear forwards;
        }
        .toast.error { background: #f44336; }
        .toast.success { background: #4CAF50; }
        @keyframes progress {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .poetry-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 240px;
            z-index: 99;
            padding: 12px 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            color: var(--light-text);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .poetry-content { margin-bottom: 8px; font-style: italic; }
        .poetry-meta { display: flex; justify-content: space-between; align-items: center; }
        .poetry-author { font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); text-align: right; }
        .poetry-refresh-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 20px;
            transition: background 0.3s ease, color 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .poetry-refresh-btn:hover { background: rgba(255, 255, 255, 0.15); color: white; }

        @media (max-width: 640px) { .poetry-card { display: none; } }
        @media (max-width: 1024px) {
            .toc-container { display: none; }
            .toc-toggle.mobile-only { display: flex; }
        }
        @media (max-width: 768px) {
            .article-title { font-size: 1.8rem; }
            .article-meta { flex-direction: column; align-items: flex-start; gap: 10px; }
            .back-btn { top: 15px; left: 15px; width: 45px; height: 45px; }
            .toc-toggle { top: 80px; right: 15px; width: 45px; height: 45px; }
            .toc-container { right: 15px; max-width: 280px; }
            .loading-card { width: 280px; padding: 28px 22px 20px; }
            :root { --blur-amount: 8px; --scrollbar-width: 8px; }
            .toast-container { max-width: 250px; }
            .article-full-content h3 { margin-left: 6px; }
            .article-full-content h4 { margin-left: 12px; }
            .article-full-content h5 { margin-left: 18px; }
            .article-full-content h6 { margin-left: 24px; }
            .article-full-content img.lazy-img { min-height: 140px; }
            .article-full-content img.lazy-error { min-height: 100px; }
            .lightbox-close,
            .lightbox-rotate-cw,
            .lightbox-rotate-ccw { width: 40px; height: 40px; font-size: 1.3rem; }
            .lightbox-close { right: 15px; }
            .lightbox-rotate-cw { right: 65px; }
            .lightbox-rotate-ccw { right: 115px; }
        }
        @media (max-width: 480px) {
            .article-title { font-size: 1.6rem; }
            .article-meta { font-size: 0.9rem; }
            .article-full-content { font-size: 1rem; }
            .code-language { font-size: 0.7rem; right: 45px; }
            .copy-btn { padding: 5px 8px; font-size: 0.7rem; }
            .toc-container { max-width: 250px; }
            .loading-card { width: 260px; padding: 24px 18px 16px; }
            .loading-card .loader { width: 38px; height: 38px; border-width: 3px; }
            .loading-card .loading-text { font-size: 0.95rem; }
            .article-full-content h3 { margin-left: 4px; }
            .article-full-content h4 { margin-left: 8px; }
            .article-full-content h5 { margin-left: 12px; }
            .article-full-content h6 { margin-left: 16px; }
            .article-full-content img.lazy-img { min-height: 110px; }
            .article-full-content img.lazy-error { min-height: 80px; }
            .lightbox-close,
            .lightbox-rotate-cw,
            .lightbox-rotate-ccw { width: 36px; height: 36px; font-size: 1.2rem; }
            .lightbox-close { right: 10px; }
            .lightbox-rotate-cw { right: 55px; }
            .lightbox-rotate-ccw { right: 100px; }
        }

        .article-footer {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            backdrop-filter: blur(var(--blur-amount));
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        ::-webkit-scrollbar { width: var(--scrollbar-width); height: var(--scrollbar-width); }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(66, 133, 244, 0.5); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(66, 133, 244, 0.7); }
        .toc-container::-webkit-scrollbar { width: 8px; }
        .toc-container::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
        .toc-container::-webkit-scrollbar-thumb { background: rgba(66, 133, 244, 0.4); border-radius: 4px; }
        .toc-container::-webkit-scrollbar-thumb:hover { background: rgba(66, 133, 244, 0.6); }
        .article-full-content pre::-webkit-scrollbar { height: 8px; }
        .article-full-content pre::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .article-full-content pre::-webkit-scrollbar-thumb { background: rgba(66, 133, 244, 0.5); border-radius: 4px; }
        .article-full-content pre::-webkit-scrollbar-thumb:hover { background: rgba(66, 133, 244, 0.7); }
        * { scrollbar-width: thin; scrollbar-color: rgba(66, 133, 244, 0.5) rgba(0, 0, 0, 0.1); }
        .toc-container { scrollbar-width: thin; scrollbar-color: rgba(66, 133, 244, 0.4) transparent; }
        .article-full-content pre { scrollbar-width: thin; scrollbar-color: rgba(66, 133, 244, 0.5) rgba(0, 0, 0, 0.2); }
        ::selection { background: rgba(66, 133, 244, 0.3); color: white; text-shadow: none; }
        ::-moz-selection { background: rgba(66, 133, 244, 0.3); color: white; text-shadow: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-card">
            <div class="loader"></div>
            <div class="loading-text">加载中...</div>
            <div class="loading-subtext" id="loading-subtext">正在加载，请耐心等待˶･֊･˶</div>
            <div class="loading-progress-container">
                <div class="loading-progress-bar" id="loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <a href="/" class="back-btn glass">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="toc-toggle glass mobile-only" id="toc-toggle">
        <i class="fas fa-list"></i>
    </div>

    <div class="link-confirm glass" id="link-confirm">
        <p>您即将离开本站，是否继续？</p>
        <a id="link-url" href="#" target="_blank"></a>
        <div class="link-confirm-buttons">
            <button class="link-confirm-btn cancel" id="link-cancel">取消</button>
            <button class="link-confirm-btn confirm" id="link-confirm-btn">继续</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <button class="lightbox-rotate-cw" id="lightbox-rotate-cw" title="顺时针旋转">
            <i class="fas fa-redo"></i>
        </button>
        <button class="lightbox-rotate-ccw" id="lightbox-rotate-ccw" title="逆时针旋转">
            <i class="fas fa-undo"></i>
        </button>
        <img id="lightbox-img" alt="Lightbox">
    </div>

    <div class="toc-container glass" id="toc-container">
        <div class="toc-title">目录</div>
        <ul class="toc-list" id="toc-list"></ul>
    </div>

    <div class="back-to-top" id="back-to-top">
        <svg class="progress-ring" viewBox="0 0 50 50">
            <defs>
                <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#a1c4fd"/>
                    <stop offset="100%" stop-color="#c2e9fb"/>
                </linearGradient>
            </defs>
            <circle class="progress-ring-track" cx="25" cy="25" r="20"/>
            <circle class="progress-ring-progress" cx="25" cy="25" r="20" id="progress-circle"/>
        </svg>
        <i class="fas fa-arrow-up back-to-top-icon"></i>
    </div>

    <div class="poetry-card glass" id="poetry-card">
        <div class="poetry-content" id="poetry-content">加载中...</div>
        <div class="poetry-meta">
            <button class="poetry-refresh-btn" id="poetry-refresh-btn" title="换一句">
                <i class="fas fa-sync-alt"></i>
            </button>
            <div class="poetry-author" id="poetry-author"></div>
        </div>
    </div>

    <div class="container">
        <div class="article-container glass" id="article-container">
            <div class="article-header">
                <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
                <div class="article-meta">
                    <div>
                        <span>{{ARTICLE_DATE}}</span>
                        <span id="article-latest" data-latest="{{ARTICLE_LATEST}}" style="display:none;">
                            <span> | </span>
                            <span class="latest-label">更新于 <span id="article-latest-time"></span></span>
                        </span>
                        <span> | </span>
                        <span id="article-category">{{ARTICLE_CATEGORY}}</span>
                    </div>
                    <div class="reading-time">预计阅读时间: {{READING_TIME}}</div>
                </div>
            </div>
            <div class="article-full-content">
                {{ARTICLE_CONTENT}}
            </div>
        </div>

        <footer class="article-footer" id="article-footer" {{LICENSE_DISPLAY}}>
            <div class="footer-content">{{LICENSE_HTML}}</div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

    <script>
        (function() {
            const WALLPAPER_TOTAL_TIMEOUT = 22000;
            const LOADING_MAX_DISPLAY = 8000;
            const IMG_TIMEOUT_B2 = 10000;
            const IMG_TIMEOUT_FALLBACK = 7000;
            const FETCH_TIMEOUT_CONFIG = 6000;
            const FETCH_TIMEOUT_BING = 8000;
            const FETCH_TIMEOUT_360 = 8000;

            const loadingErrors = [];
            let articleImageObserver = null;
            let currentRotation = 0;
            let loadingOverlayHidden = false;
            let wallpaperResolved = false;

            async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                    return response;
                } catch (e) {
                    clearTimeout(timeoutId);
                    if (e.name === 'AbortError') throw new Error('请求超时');
                    throw e;
                }
            }

            function showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const progress = document.createElement('div');
                progress.className = 'toast-progress';
                const msg = document.createElement('div');
                msg.textContent = message;
                toast.appendChild(progress);
                toast.appendChild(msg);
                container.appendChild(toast);
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => {
                        if (container.contains(toast)) container.removeChild(toast);
                    }, 400);
                }, 3000);
            }

            function updateLoadingProgress(percentage, subtext) {
                const progressBar = document.getElementById('loading-progress-bar');
                const subtextEl = document.getElementById('loading-subtext');
                if (progressBar) progressBar.style.width = Math.min(percentage, 100) + '%';
                if (subtextEl && subtext) subtextEl.textContent = subtext;
            }

            function hideLoadingOverlay() {
                if (loadingOverlayHidden) return;
                loadingOverlayHidden = true;
                const overlay = document.getElementById('loading-overlay');
                if (!overlay) return;
                updateLoadingProgress(100, '加载完成˶>ᗜ<˶');
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                }, 500);
            }

            function addLoadingError(msg) {
                loadingErrors.push(msg);
            }

            function flushLoadingErrors() {
                if (loadingErrors.length === 0) return;
                const unique = [...new Set(loadingErrors)];
                unique.forEach(err => showToast(err, 'error'));
                loadingErrors.length = 0;
            }

            function loadImageWithTimeout(imgUrl, timeoutMs) {
                return new Promise((resolve) => {
                    const img = new Image();
                    let settled = false;
                    const finish = (success) => {
                        if (settled) return;
                        settled = true;
                        clearTimeout(timer);
                        if (success) {
                            document.body.style.backgroundImage = 'url(' + imgUrl + ')';
                        }
                        resolve(success);
                    };
                    const timer = setTimeout(() => {
                        if (!settled && !img.complete) {
                            console.warn('图片加载超时:', imgUrl);
                        }
                        finish(img.naturalWidth > 0);
                    }, timeoutMs);
                    img.onload = () => finish(true);
                    img.onerror = () => finish(false);
                    img.src = imgUrl;
                    if (img.complete) {
                        finish(img.naturalWidth > 0);
                    }
                });
            }

            async function loadWallpaperFromConfig() {
                try {
                    const res = await fetchWithTimeout('../wallpaper.json', {}, FETCH_TIMEOUT_CONFIG);
                    if (!res.ok) throw new Error('请求失败');
                    const data = await res.json();
                    if (data && data.length) {
                        const entry = data[Math.floor(Math.random() * data.length)];
                        let imgUrl = entry.path;
                        if (!/^https?:\/\//i.test(imgUrl)) {
                            imgUrl = '../' + imgUrl;
                        }
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_B2);
                    }
                    return false;
                } catch (e) {
                    console.warn('壁纸配置加载失败:', e);
                    return false;
                }
            }

            async function loadBingWallpaper() {
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const bingApiUrl = 'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN';
                try {
                    const response = await fetchWithTimeout(
                        proxyUrl + encodeURIComponent(bingApiUrl), {}, FETCH_TIMEOUT_BING
                    );
                    const data = await response.json();
                    if (data.images && data.images[0]) {
                        const imgUrl = 'https://www.bing.com' + data.images[0].url;
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_FALLBACK);
                    }
                    return false;
                } catch (error) {
                    console.warn('Bing 壁纸加载失败:', error);
                    return false;
                }
            }

            async function load360Wallpaper() {
                const url = 'https://mini.browser.360.cn/newtab/imgsx?tid=67&page=1';
                try {
                    const response = await fetchWithTimeout(url, {}, FETCH_TIMEOUT_360);
                    const data = await response.json();
                    if (data && data.data && data.data.length > 0) {
                        const randomIndex = Math.floor(Math.random() * data.data.length);
                        const imgUrl = data.data[randomIndex].url;
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_FALLBACK);
                    }
                    return false;
                } catch (error) {
                    console.warn('360 壁纸加载失败:', error);
                    return false;
                }
            }

            async function loadWallpaperBackground() {
                if (wallpaperResolved) return;
                const deadline = Date.now() + WALLPAPER_TOTAL_TIMEOUT;
                const sources = [
                    { name: '本地配置', fn: loadWallpaperFromConfig },
                    { name: 'Bing', fn: loadBingWallpaper },
                    { name: '360', fn: load360Wallpaper }
                ];
                for (const source of sources) {
                    if (Date.now() >= deadline) {
                        console.warn('壁纸加载总超时，停止尝试');
                        break;
                    }
                    const remaining = deadline - Date.now();
                    try {
                        const raceResult = await Promise.race([
                            source.fn(),
                            new Promise((resolve) => setTimeout(() => resolve(false), remaining))
                        ]);
                        if (raceResult === true) {
                            wallpaperResolved = true;
                            return true;
                        }
                    } catch (e) {
                        console.warn(source.name + ' 壁纸源异常:', e);
                    }
                }
                if (!wallpaperResolved) {
                    document.body.style.backgroundImage = 'linear-gradient(180deg, #87CEEB 0%, #ffffff 100%)';
                    document.body.style.backgroundSize = 'cover';
                }
                wallpaperResolved = true;
                return false;
            }

            function prepareArticleImagesForLazyLoading() {
                const images = document.querySelectorAll('.article-full-content img');
                if (images.length === 0) return false;
                images.forEach(img => {
                    if (img.complete && img.naturalWidth > 0) return;
                    const src = img.getAttribute('src');
                    if (src && !img.hasAttribute('data-src')) {
                        img.setAttribute('data-src', src);
                        img.removeAttribute('src');
                        img.classList.add('lazy-img');
                    }
                });
                return document.querySelectorAll('.article-full-content img[data-src]').length > 0;
            }

            function startArticleImageLazyLoading() {
                const lazyImages = document.querySelectorAll('.article-full-content img[data-src]');
                if (lazyImages.length === 0) return;
                if (articleImageObserver) articleImageObserver.disconnect();
                articleImageObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            const dataSrc = img.getAttribute('data-src');
                            if (dataSrc) {
                                img.src = dataSrc;
                                img.removeAttribute('data-src');
                                img.onload = () => {
                                    img.classList.remove('lazy-img');
                                    img.classList.add('lazy-loaded');
                                };
                                img.onerror = () => {
                                    img.classList.remove('lazy-img');
                                    img.classList.add('lazy-error');
                                };
                            }
                            articleImageObserver.unobserve(img);
                        }
                    });
                }, { root: null, rootMargin: '250px', threshold: 0 });
                lazyImages.forEach(img => articleImageObserver.observe(img));
            }

            function preventTocScrollPropagation() {
                const tocContainer = document.getElementById('toc-container');
                if (tocContainer) {
                    tocContainer.addEventListener('wheel', function(e) {
                        const isScrollable = this.scrollHeight > this.clientHeight;
                        const isAtTop = this.scrollTop === 0;
                        const isAtBottom = this.scrollTop + this.clientHeight >= this.scrollHeight - 1;
                        const scrollingUp = e.deltaY < 0;
                        const scrollingDown = e.deltaY > 0;
                        if ((isAtTop && scrollingUp) || (isAtBottom && scrollingDown)) return true;
                        if (isScrollable) e.stopPropagation();
                    }, { passive: false });
                }
            }

            function addCopyButtonsToCodeBlocks() {
                const codeBlocks = document.querySelectorAll('.article-full-content pre');
                codeBlocks.forEach((pre) => {
                    const copyButton = document.createElement('button');
                    copyButton.className = 'copy-btn';
                    copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                    const code = pre.querySelector('code');
                    const language = code.className.replace('language-', '') || 'code';
                    const langLabel = document.createElement('span');
                    langLabel.className = 'code-language';
                    langLabel.textContent = language;
                    pre.appendChild(langLabel);
                    copyButton.addEventListener('click', () => {
                        const textToCopy = code.innerText;
                        navigator.clipboard.writeText(textToCopy).then(() => {
                            copyButton.innerHTML = '<i class="fas fa-check"></i> 已复制';
                            copyButton.classList.add('success');
                            showToast('代码已复制到剪贴板', 'success');
                            setTimeout(() => {
                                copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                                copyButton.classList.remove('success');
                            }, 2000);
                        }).catch(err => {
                            console.error('复制失败:', err);
                            copyButton.innerHTML = '<i class="fas fa-times"></i> 失败';
                            copyButton.classList.add('error');
                            setTimeout(() => {
                                copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                                copyButton.classList.remove('error');
                            }, 2000);
                        });
                    });
                    pre.appendChild(copyButton);
                });
            }

            function handleImageClick(e) {
                const target = e.target;
                if (target.tagName === 'IMG' && target.closest('.article-full-content')) {
                    const imgSrc = target.src;
                    if (!imgSrc && target.hasAttribute('data-src')) return;
                    if (imgSrc && !target.closest('a')) {
                        const lightbox = document.getElementById('lightbox');
                        const lightboxImg = document.getElementById('lightbox-img');
                        lightboxImg.src = imgSrc;
                        lightboxImg.style.transform = 'rotate(0deg)';
                        currentRotation = 0;
                        lightbox.style.display = 'flex';
                    }
                }
                if (target.tagName === 'IMG' && target.closest('a') && target.closest('.article-full-content')) {
                    e.preventDefault();
                    const link = target.closest('a');
                    showLinkConfirm(link.href);
                }
            }

            function closeLightbox() {
                document.getElementById('lightbox').style.display = 'none';
                hideLinkConfirm();
            }

            function rotateCW() {
                const lightboxImg = document.getElementById('lightbox-img');
                if (!lightboxImg || document.getElementById('lightbox').style.display !== 'flex') return;
                currentRotation += 90;
                lightboxImg.style.transform = `rotate(${currentRotation}deg)`;
            }

            function rotateCCW() {
                const lightboxImg = document.getElementById('lightbox-img');
                if (!lightboxImg || document.getElementById('lightbox').style.display !== 'flex') return;
                currentRotation -= 90;
                lightboxImg.style.transform = `rotate(${currentRotation}deg)`;
            }

            function showLinkConfirm(url) {
                const confirmEl = document.getElementById('link-confirm');
                const linkUrlEl = document.getElementById('link-url');
                linkUrlEl.textContent = url;
                linkUrlEl.href = url;
                confirmEl.style.display = 'block';
                setTimeout(() => confirmEl.classList.add('show'), 10);
                document.getElementById('link-confirm-btn').onclick = function() {
                    hideLinkConfirm();
                    window.open(url, '_blank');
                };
            }

            function hideLinkConfirm() {
                const confirmEl = document.getElementById('link-confirm');
                confirmEl.classList.remove('show');
                setTimeout(() => { confirmEl.style.display = 'none'; }, 400);
            }

            function formatRelativeTime(dateStr) {
                if (!dateStr) return '';
                const now = new Date();
                const date = new Date(dateStr);
                const diffMs = now - date;
                const diffMinutes = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                if (diffMinutes < 1) return '刚刚';
                if (diffMinutes < 60) return `${diffMinutes} 分钟前`;
                if (diffHours < 24) return `${diffHours} 小时前`;
                if (diffDays <= 30) return `${diffDays} 天前`;
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function displayLatestInfo() {
                const latestEl = document.getElementById('article-latest');
                const latestTimeEl = document.getElementById('article-latest-time');
                const latestStr = latestEl ? latestEl.dataset.latest : '';
                if (latestStr) {
                    latestEl.style.display = 'inline';
                    latestTimeEl.textContent = formatRelativeTime(latestStr);
                }
            }

            function generateTOC() {
                const tocContainer = document.getElementById('toc-container');
                const tocList = document.getElementById('toc-list');
                const headings = document.querySelectorAll('.article-full-content h2, .article-full-content h3');
                if (headings.length === 0) {
                    tocContainer.style.display = 'none';
                    document.getElementById('toc-toggle').style.display = 'none';
                    return;
                }
                if (window.innerWidth > 1024) {
                    tocContainer.style.display = 'block';
                } else {
                    tocContainer.style.display = 'none';
                }
                tocList.innerHTML = '';
                headings.forEach((heading, index) => {
                    if (!heading.id) heading.id = `heading-${index}`;
                    const listItem = document.createElement('li');
                    listItem.className = heading.tagName.toLowerCase() === 'h2' ? 'toc-h2' : 'toc-h3';
                    listItem.dataset.id = heading.id;
                    const link = document.createElement('a');
                    link.href = `#${heading.id}`;
                    link.textContent = heading.textContent;
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetElement = document.getElementById(heading.id);
                        if (targetElement) {
                            const offsetTop = targetElement.offsetTop - 80;
                            window.scrollTo({ top: offsetTop, behavior: 'smooth' });
                        }
                        if (window.innerWidth <= 1024) tocContainer.style.display = 'none';
                    });
                    listItem.appendChild(link);
                    tocList.appendChild(listItem);
                });
            }

            function adjustTocPosition() {
                if (window.innerWidth <= 1024) return;
                const tocContainer = document.getElementById('toc-container');
                const articleContainer = document.querySelector('.article-container');
                if (!tocContainer || !articleContainer) return;
                if (tocContainer.style.display === 'none' && window.innerWidth > 1024) return;
                const articleRect = articleContainer.getBoundingClientRect();
                const tocWidth = tocContainer.offsetWidth;
                const minGap = 20;
                const articleRightEdge = articleRect.right;
                const viewportWidth = window.innerWidth;
                const tocLeftTarget = articleRightEdge + minGap;
                const tocRightEdge = tocLeftTarget + tocWidth;
                let newRight = viewportWidth - tocRightEdge;
                const minRight = -(tocWidth - 50);
                newRight = Math.max(minRight, Math.min(newRight, viewportWidth - 10));
                tocContainer.style.right = newRight + 'px';
            }

            function updateProgressRing() {
                const progressCircle = document.getElementById('progress-circle');
                if (!progressCircle) return;
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const scrollPercent = docHeight > 0 ? Math.min(scrollTop / docHeight, 1) : 0;
                const circumference = 2 * Math.PI * 20;
                const offset = circumference * (1 - scrollPercent);
                progressCircle.style.strokeDashoffset = offset;
            }

            function handleScroll() {
                const backToTopBtn = document.getElementById('back-to-top');
                if (window.scrollY > 300) backToTopBtn.classList.add('visible');
                else backToTopBtn.classList.remove('visible');
                highlightTOC();
                updateProgressRing();
                adjustTocPosition();
            }

            function highlightTOC() {
                const headings = document.querySelectorAll('.article-full-content h2, .article-full-content h3');
                const tocItems = document.querySelectorAll('.toc-list li');
                if (headings.length === 0) return;
                let currentHeading = null;
                const scrollPosition = window.scrollY + 100;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                const isAtBottom = windowHeight + window.scrollY >= documentHeight - 100;
                if (isAtBottom) {
                    currentHeading = headings[headings.length - 1];
                } else {
                    for (let i = 0; i < headings.length; i++) {
                        const heading = headings[i];
                        const headingTop = heading.offsetTop;
                        const headingBottom = headingTop + heading.offsetHeight;
                        if ((headingTop <= scrollPosition && headingBottom >= scrollPosition) ||
                            (i === headings.length - 1 && headingTop <= scrollPosition)) {
                            currentHeading = heading;
                            break;
                        }
                        if (headingTop > scrollPosition) {
                            currentHeading = headings[Math.max(0, i - 1)];
                            break;
                        }
                    }
                }
                if (!currentHeading && headings.length > 0) currentHeading = headings[0];
                if (currentHeading) {
                    tocItems.forEach(item => {
                        if (item.dataset.id === currentHeading.id) {
                            item.classList.add('active');
                            if (window.innerWidth > 1024) {
                                const tocContainer = document.getElementById('toc-container');
                                const itemTop = item.offsetTop;
                                const containerHeight = tocContainer.clientHeight;
                                const itemHeight = item.clientHeight;
                                if (itemTop < tocContainer.scrollTop || itemTop + itemHeight > tocContainer.scrollTop + containerHeight) {
                                    tocContainer.scrollTop = itemTop - containerHeight / 2 + itemHeight / 2;
                                }
                            }
                        } else {
                            item.classList.remove('active');
                        }
                    });
                }
            }

            async function loadPoetry() {
                const contentEl = document.getElementById('poetry-content');
                const authorEl = document.getElementById('poetry-author');
                try {
                    contentEl.textContent = '加载中...';
                    authorEl.textContent = '';
                    const response = await fetchWithTimeout('https://v1.jinrishici.com/all.json', {}, 8000);
                    const data = await response.json();
                    if (data && data.content) {
                        contentEl.textContent = data.content;
                        authorEl.textContent = `—— ${data.author}`;
                    } else {
                        throw new Error('数据结构不符');
                    }
                } catch (e) {
                    contentEl.textContent = '加载失败';
                    authorEl.textContent = '';
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                const globalLoadTimer = setTimeout(() => {
                    if (!loadingOverlayHidden) {
                        updateLoadingProgress(95, '即将完成...');
                        hideLoadingOverlay();
                        flushLoadingErrors();
                    }
                }, LOADING_MAX_DISPLAY);

                updateLoadingProgress(10, '正在准备...');

                const hasLazyImages = prepareArticleImagesForLazyLoading();

                loadWallpaperBackground().then(ok => {
                    if (!ok) addLoadingError('所有壁纸源均加载失败，已启用天空渐变背景');
                }).catch(e => {
                    console.warn('壁纸后台加载异常:', e);
                });

                updateLoadingProgress(55, '正在增强文章...');
                if (hasLazyImages) startArticleImageLazyLoading();
                addCopyButtonsToCodeBlocks();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                generateTOC();
                displayLatestInfo();
                document.addEventListener('click', handleImageClick);
                window.addEventListener('scroll', handleScroll);

                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        const tocContainer = document.getElementById('toc-container');
                        if (window.innerWidth > 1024) {
                            tocContainer.style.display = 'block';
                            adjustTocPosition();
                        } else {
                            tocContainer.style.display = '';
                        }
                        updateProgressRing();
                    }, 150);
                });

                document.getElementById('back-to-top').addEventListener('click', () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                document.getElementById('toc-toggle').addEventListener('click', () => {
                    const tocContainer = document.getElementById('toc-container');
                    if (tocContainer.style.display === 'block') {
                        tocContainer.style.display = 'none';
                    } else {
                        tocContainer.style.display = 'block';
                        highlightTOC();
                        const activeItem = document.querySelector('.toc-list li.active');
                        if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                preventTocScrollPropagation();
                document.getElementById('link-cancel').addEventListener('click', hideLinkConfirm);

                document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
                document.getElementById('lightbox').addEventListener('click', (ev) => {
                    if (ev.target === document.getElementById('lightbox')) closeLightbox();
                });
                document.getElementById('lightbox-rotate-cw').addEventListener('click', rotateCW);
                document.getElementById('lightbox-rotate-ccw').addEventListener('click', rotateCCW);

                updateLoadingProgress(90, '即将完成...');
                loadPoetry();
                document.getElementById('poetry-refresh-btn').addEventListener('click', loadPoetry);

                adjustTocPosition();
                updateProgressRing();

                const footerContent = document.querySelector('#article-footer .footer-content');
                if (footerContent && /保留所有权利/.test(footerContent.textContent)) {
                    footerContent.innerHTML = '<span>作者保留此文章所有权利</span>';
                }

                hideLoadingOverlay();
                flushLoadingErrors();
                clearTimeout(globalLoadTimer);
            });
        })();
    </script>
</body>
</html>
