<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ARTICLE_TITLE}} - xundei's blog</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        /* 超链接基础样式 */
        .article-full-content a:not(:has(img)) {
            text-decoration: none;
            position: relative;
            color: #a1c4fd;
            transition: color 0.3s ease, background 0.3s ease;
            padding: 0 2px;
            border-radius: 2px;
            background: transparent;
        }

        .article-full-content a:not(:has(img)):hover {
            color: #ffffff;
            background: rgba(66, 133, 244, 0.2);
        }

        .article-full-content a:not(:has(img))::before {
            content: none !important;
        }

        .article-full-content a:not(:has(img))::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .article-full-content a:not(:has(img)):hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* 排除特定区域链接样式 */
        .toc-list a {
            color: rgba(255,255,255,0.8) !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }

        .toc-list a:hover {
            color: var(--primary-color) !important;
            transform: translateX(5px) !important;
        }

        .toc-list a::before,
        .toc-list a::after {
            content: none !important;
        }

        .link-confirm a {
            color: #a3c8ff !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }

        .link-confirm a::before,
        .link-confirm a::after {
            content: none !important;
        }

        .article-footer a {
            color: #a1c4fd !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .article-footer a::before,
        .article-footer a::after {
            content: none !important;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --primary-color: #4285F4;
            --text-color: #333;
            --light-text: #fff;
            --transition: all 0.3s ease;
            --blur-amount: 12px;
            --code-bg: #1e1e1e;
            --code-copy-bg: rgba(255, 255, 255, 0.1);
            --code-copy-hover: rgba(255, 255, 255, 0.2);
            --success-color: #4CAF50;
            --error-color: #f44336;
            --scrollbar-width: 10px;
            --glow-color: rgba(66, 133, 244, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
            background-color: #121212;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* 加载弹窗 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-card {
            background: rgba(30, 60, 120, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 160, 240, 0.45);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25), 0 0 30px rgba(66, 133, 244, 0.35);
            padding: 35px 30px 25px;
            width: 320px;
            max-width: 85vw;
            text-align: center;
            transition: all 0.3s ease;
            animation: loadingPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes loadingPopIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .loading-card .loader {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 4px solid #5badf5;
            border-right: 4px solid #3d8ef7;
            animation: spin 0.9s linear infinite;
            margin-bottom: 18px;
        }

        .loading-card .loading-text {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .loading-card .loading-subtext {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 18px;
            min-height: 18px;
        }

        .loading-progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3d8ef7, #5badf5, #7dc8f8);
            background-size: 200% 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progressShimmer 2s linear infinite;
            box-shadow: 0 0 12px rgba(66, 150, 244, 0.5);
        }

        @keyframes progressShimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            transition: var(--transition);
        }

        .reading-time {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .article-container {
            max-width: 800px;
            margin: 60px auto 40px;
        }

        .article-header {
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .article-title {
            font-size: 2.2rem;
            color: var(--light-text);
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .article-full-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        /* ========== 标题层级样式 ========== */
        .article-full-content h2 {
            font-size: 1.7rem;
            margin: 30px 0 20px 0;
            color: var(--light-text);
            position: relative;
            padding-left: 16px;
        }

        .article-full-content h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 60%;
            background: var(--primary-color);
            border-radius: 3px;
        }

        .article-full-content h3 {
            font-size: 1.4rem;
            margin: 28px 0 18px 10px;
            color: rgba(255, 255, 255, 0.93);
            position: relative;
            padding-left: 15px;
        }

        .article-full-content h3::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 55%;
            background: rgba(66, 133, 244, 0.85);
            border-radius: 3px;
        }

        .article-full-content h4 {
            font-size: 1.2rem;
            margin: 24px 0 14px 20px;
            color: rgba(255, 255, 255, 0.85);
            position: relative;
            padding-left: 14px;
        }

        .article-full-content h4::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 50%;
            background: rgba(66, 133, 244, 0.7);
            border-radius: 2px;
        }

        .article-full-content h5 {
            font-size: 1.05rem;
            margin: 20px 0 10px 30px;
            color: rgba(255, 255, 255, 0.78);
            position: relative;
            padding-left: 12px;
        }

        .article-full-content h5::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 40%;
            background: rgba(66, 133, 244, 0.55);
            border-radius: 2px;
        }

        .article-full-content h6 {
            font-size: 0.95rem;
            margin: 18px 0 8px 38px;
            color: rgba(255, 255, 255, 0.7);
            position: relative;
            padding-left: 10px;
        }

        .article-full-content h6::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 35%;
            background: rgba(66, 133, 244, 0.45);
            border-radius: 2px;
        }

        .article-full-content p {
            margin-bottom: 25px;
        }

        .article-full-content ul,
        .article-full-content ol {
            margin-bottom: 25px;
            padding-left: 30px;
        }

        .article-full-content ul li,
        .article-full-content ol li {
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .article-full-content pre {
            position: relative;
            background: var(--code-bg);
            color: #dcdcdc;
            padding: 50px 20px 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 25px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .article-full-content code {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .article-full-content pre code {
            background: none;
            padding: 0;
            display: block;
            overflow-x: auto;
        }

        .code-language {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--code-copy-bg);
            border: none;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            padding: 6px 12px;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }

        .copy-btn:hover {
            background: var(--code-copy-hover);
            color: white;
            box-shadow: 0 0 10px var(--glow-color);
        }

        .copy-btn.success {
            background: var(--success-color);
            color: white;
        }

        .copy-btn.error {
            background: var(--error-color);
            color: white;
        }

        .article-full-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 25px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .article-full-content img:hover {
            box-shadow: 0 0 20px var(--glow-color);
        }

        .article-full-content blockquote {
            border-left: 4px solid var(--primary-color);
            padding: 10px 20px;
            margin: 25px 0;
            background: rgba(66, 133, 244, 0.1);
            border-radius: 0 8px 8px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(66, 133, 244, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lightbox-close:hover {
            color: var(--primary-color);
        }

        .toc-container {
            position: fixed;
            top: 100px;
            right: 30px;
            max-width: 300px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            z-index: 99;
            display: none;
            animation: slideInRight 0.3s ease;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            overscroll-behavior: contain;
        }

        .toc-toggle {
            position: fixed;
            top: 100px;
            right: 30px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .toc-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .toc-toggle.mobile-only {
            display: none;
        }

        .toc-title {
            font-size: 1.2rem;
            color: var(--light-text);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .toc-list {
            list-style-type: none;
            padding-left: 15px;
        }

        .toc-list li {
            margin-bottom: 8px;
            line-height: 1.4;
            transition: all 0.3s ease;
            border-radius: 6px;
            padding: 4px 8px;
        }

        .toc-list li:hover {
            background: rgba(66, 133, 244, 0.1);
            transform: translateX(5px);
        }

        .toc-list li.active {
            background: rgba(66, 133, 244, 0.2);
            border-left: 3px solid var(--primary-color);
            padding-left: 12px;
        }

        .toc-list a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: var(--transition);
            display: block;
            padding: 3px 0;
        }

        .toc-list a:hover {
            color: var(--primary-color);
        }

        .toc-list .toc-h2 {
            font-weight: 600;
            padding-left: 0;
        }

        .toc-list .toc-h3 {
            font-weight: 400;
            padding-left: 15px;
            font-size: 0.95rem;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            z-index: 98;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-to-top.visible {
            opacity: 1;
        }

        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .link-confirm {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            z-index: 1001;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            display: none;
        }

        .link-confirm.show {
            transform: translateY(0);
            opacity: 1;
        }

        .link-confirm p {
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        .link-confirm a {
            color: #a3c8ff;
            word-break: break-all;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }

        .link-confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .link-confirm-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .link-confirm-btn.confirm {
            background: var(--primary-color);
            color: white;
        }

        .link-confirm-btn.confirm:hover {
            background: #3b78e7;
            box-shadow: 0 0 10px var(--glow-color);
        }

        .link-confirm-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .link-confirm-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 300px;
        }

        .toast {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.8);
            width: 100%;
            transform-origin: left;
            animation: progress 3s linear forwards;
        }

        .toast.error {
            background: #f44336;
        }

        .toast.success {
            background: #4CAF50;
        }

        @keyframes progress {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: var(--scrollbar-width);
            height: var(--scrollbar-width);
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(66, 133, 244, 0.5);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(66, 133, 244, 0.7);
        }

        .toc-container::-webkit-scrollbar {
            width: 8px;
        }

        .toc-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 4px;
        }

        .toc-container::-webkit-scrollbar-thumb {
            background: rgba(66, 133, 244, 0.4);
            border-radius: 4px;
        }

        .toc-container::-webkit-scrollbar-thumb:hover {
            background: rgba(66, 133, 244, 0.6);
        }

        .article-full-content pre::-webkit-scrollbar {
            height: 8px;
        }

        .article-full-content pre::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .article-full-content pre::-webkit-scrollbar-thumb {
            background: rgba(66, 133, 244, 0.5);
            border-radius: 4px;
        }

        .article-full-content pre::-webkit-scrollbar-thumb:hover {
            background: rgba(66, 133, 244, 0.7);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(66, 133, 244, 0.5) rgba(0, 0, 0, 0.1);
        }

        .toc-container {
            scrollbar-width: thin;
            scrollbar-color: rgba(66, 133, 244, 0.4) transparent;
        }

        .article-full-content pre {
            scrollbar-width: thin;
            scrollbar-color: rgba(66, 133, 244, 0.5) rgba(0, 0, 0, 0.2);
        }

        ::selection {
            background: rgba(66, 133, 244, 0.3);
            color: white;
            text-shadow: none;
        }

        ::-moz-selection {
            background: rgba(66, 133, 244, 0.3);
            color: white;
            text-shadow: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(30px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== 古诗词小窗（按钮与作者同行，无旋转无文字） ========== */
        .poetry-card {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 240px;
            z-index: 99;
            padding: 12px 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            color: var(--light-text);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .poetry-content {
            margin-bottom: 8px;
            font-style: italic;
        }

        .poetry-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .poetry-author {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            text-align: right;
        }

        .poetry-refresh-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 20px;
            transition: background 0.3s ease, color 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .poetry-refresh-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* 屏幕较小时隐藏诗词卡片 */
        @media (max-width: 640px) {
            .poetry-card {
                display: none;
            }
        }

        @media (max-width: 1024px) {
            .toc-container {
                display: none;
            }
            .toc-toggle.mobile-only {
                display: flex;
            }
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 1.8rem;
            }
            .article-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .back-btn {
                top: 15px;
                left: 15px;
                width: 45px;
                height: 45px;
            }
            .toc-toggle {
                top: 80px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
            .toc-container {
                right: 15px;
                max-width: 280px;
            }
            .loading-card {
                width: 280px;
                padding: 28px 22px 20px;
            }
            :root {
                --blur-amount: 8px;
                --scrollbar-width: 8px;
            }
            .toast-container {
                max-width: 250px;
            }
            .article-full-content h3 {
                margin-left: 6px;
            }
            .article-full-content h4 {
                margin-left: 12px;
            }
            .article-full-content h5 {
                margin-left: 18px;
            }
            .article-full-content h6 {
                margin-left: 24px;
            }
        }

        @media (max-width: 480px) {
            .article-title {
                font-size: 1.6rem;
            }
            .article-meta {
                font-size: 0.9rem;
            }
            .article-full-content {
                font-size: 1rem;
            }
            .code-language {
                font-size: 0.7rem;
                right: 45px;
            }
            .copy-btn {
                padding: 5px 8px;
                font-size: 0.7rem;
            }
            .toc-container {
                max-width: 250px;
            }
            .loading-card {
                width: 260px;
                padding: 24px 18px 16px;
            }
            .loading-card .loader {
                width: 38px;
                height: 38px;
                border-width: 3px;
            }
            .loading-card .loading-text {
                font-size: 0.95rem;
            }
            .article-full-content h3 {
                margin-left: 4px;
            }
            .article-full-content h4 {
                margin-left: 8px;
            }
            .article-full-content h5 {
                margin-left: 12px;
            }
            .article-full-content h6 {
                margin-left: 16px;
            }
        }

        .article-footer {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            backdrop-filter: blur(var(--blur-amount));
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <!-- 加载弹窗 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-card">
            <div class="loader"></div>
            <div class="loading-text">加载中...</div>
            <div class="loading-subtext" id="loading-subtext">正在加载，请耐心等待(๑•̀ㅂ•́)و✧</div>
            <div class="loading-progress-container">
                <div class="loading-progress-bar" id="loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-btn glass">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="toc-toggle glass mobile-only" id="toc-toggle">
        <i class="fas fa-list"></i>
    </div>

    <div class="link-confirm glass" id="link-confirm">
        <p>您即将离开本站，是否继续？</p>
        <a id="link-url" href="#" target="_blank"></a>
        <div class="link-confirm-buttons">
            <button class="link-confirm-btn cancel" id="link-cancel">取消</button>
            <button class="link-confirm-btn confirm" id="link-confirm-btn">继续</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img id="lightbox-img" alt="Lightbox">
    </div>

    <div class="toc-container glass" id="toc-container">
        <div class="toc-title">目录</div>
        <ul class="toc-list" id="toc-list"></ul>
    </div>

    <div class="back-to-top glass" id="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- 古诗词小窗卡片（按钮与作者同行，无旋转无文字） -->
    <div class="poetry-card glass" id="poetry-card">
        <div class="poetry-content" id="poetry-content">加载中...</div>
        <div class="poetry-meta">
            <button class="poetry-refresh-btn" id="poetry-refresh-btn" title="换一句">
                <i class="fas fa-sync-alt"></i>
            </button>
            <div class="poetry-author" id="poetry-author"></div>
        </div>
    </div>

    <div class="container">
        <div class="article-container glass" id="article-container">
            <div class="article-header">
                <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
                <div class="article-meta">
                    <div>
                        <span>{{ARTICLE_DATE}}</span>
                        <span> | </span>
                        <span id="article-category">{{ARTICLE_CATEGORY}}</span>
                    </div>
                    <div class="reading-time">预计阅读时间: {{READING_TIME}}</div>
                </div>
            </div>
            <div class="article-full-content">
                {{ARTICLE_CONTENT}}
            </div>
        </div>

        <footer class="article-footer" id="article-footer" style="display: none;">
            <div class="footer-content" id="license-text"></div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

    <script src="../axios.min.js" defer></script>
    <script>
        const loadingErrors = [];

        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const progress = document.createElement('div');
            progress.className = 'toast-progress';
            const messageEl = document.createElement('div');
            messageEl.textContent = message;
            toast.appendChild(progress);
            toast.appendChild(messageEl);
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.classList.add('show'); }, 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toastContainer.contains(toast)) toastContainer.removeChild(toast);
                }, 400);
            }, 3000);
        }

        function updateLoadingProgress(percentage, subtext) {
            const progressBar = document.getElementById('loading-progress-bar');
            const subtextEl = document.getElementById('loading-subtext');
            if (progressBar) progressBar.style.width = percentage + '%';
            if (subtextEl && subtext) subtextEl.textContent = subtext;
        }

        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if (!overlay) return;
            updateLoadingProgress(100, '加载完成(ゝ∀･)b');
            setTimeout(() => {
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                }, 500);
            }, 350);
        }

        function addLoadingError(msg) {
            loadingErrors.push(msg);
        }

        function flushLoadingErrors() {
            if (loadingErrors.length === 0) return;
            const unique = [...new Set(loadingErrors)];
            unique.forEach(err => showToast(err, 'error'));
            loadingErrors.length = 0;
        }

        function loadWithTimeout(promise, timeoutMs, errorMsg) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error(errorMsg)), timeoutMs))
            ]);
        }

        function loadImageWithSpeedCheck(imgUrl, options = {}) {
            const {
                initialCheckMs = 8000,
                maxWaitMs = 60000
            } = options;

            return new Promise((resolve) => {
                const img = new Image();
                let initialTimer = null;
                let maxTimer = null;
                let resolved = false;

                const finish = (success) => {
                    if (resolved) return;
                    resolved = true;
                    clearTimeout(initialTimer);
                    clearTimeout(maxTimer);
                    if (success) {
                        document.body.style.backgroundImage = `url(${imgUrl})`;
                    }
                    resolve(success);
                };

                img.onload = () => finish(true);
                img.onerror = () => {
                    console.warn('图片加载失败（onerror）:', imgUrl);
                    finish(false);
                };

                img.src = imgUrl;

                initialTimer = setTimeout(() => {
                    if (resolved) return;
                    if (!img.complete) {
                        const remainingMs = maxWaitMs - initialCheckMs;
                        maxTimer = setTimeout(() => {
                            if (resolved) return;
                            if (!img.complete) {
                                console.warn('图片加载超过最大等待时间（仍在下载中，速度极慢）:', imgUrl);
                            }
                            finish(img.naturalWidth > 0);
                        }, remainingMs);
                    } else {
                        if (img.naturalWidth > 0) {
                            finish(true);
                        } else {
                            console.warn('图片加载失败（速度为0，naturalWidth=0）:', imgUrl);
                            finish(false);
                        }
                    }
                }, initialCheckMs);
            });
        }

        async function loadWallpapers() {
            try {
                const response = await axios.get('../wallpaper.json', { timeout: 10000 });
                const data = response.data;
                if (data && data.length) {
                    const entry = data[Math.floor(Math.random() * data.length)];
                    let imgUrl = entry.path;
                    if (!/^https?:\/\//i.test(imgUrl)) {
                        imgUrl = '../' + imgUrl;
                    }
                    imgUrl += '?t=' + new Date().getTime();
                    return await loadImageWithSpeedCheck(imgUrl, {
                        initialCheckMs: 8000,
                        maxWaitMs: 60000
                    });
                }
                return false;
            } catch (e) {
                console.error('壁纸配置加载失败:', e);
                return false;
            }
        }

        async function setDefaultWallpaper() {
            try {
                const bingResponse = await axios.get('https://bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN', { timeout: 8000 });
                const bingData = bingResponse.data;
                if (bingData.images && bingData.images[0]) {
                    const bingUrl = 'https://bing.com' + bingData.images[0].url;
                    return await loadImageWithSpeedCheck(bingUrl, {
                        initialCheckMs: 6000,
                        maxWaitMs: 30000
                    });
                }
            } catch (error) {
                console.error('获取必应壁纸失败:', error);
            }
            const defaultWallpaper = 'https://www.yumus.cn/api/?target=img&brand=360&type=3';
            return await loadImageWithSpeedCheck(defaultWallpaper, {
                initialCheckMs: 6000,
                maxWaitMs: 30000
            });
        }

        function preventTocScrollPropagation() {
            const tocContainer = document.getElementById('toc-container');
            if (tocContainer) {
                tocContainer.addEventListener('wheel', function(e) {
                    const isScrollable = this.scrollHeight > this.clientHeight;
                    const isAtTop = this.scrollTop === 0;
                    const isAtBottom = this.scrollTop + this.clientHeight >= this.scrollHeight - 1;
                    const scrollingUp = e.deltaY < 0;
                    const scrollingDown = e.deltaY > 0;
                    if ((isAtTop && scrollingUp) || (isAtBottom && scrollingDown)) return true;
                    if (isScrollable) e.stopPropagation();
                }, { passive: false });
            }
        }

        function addCopyButtonsToCodeBlocks() {
            const codeBlocks = document.querySelectorAll('.article-full-content pre');
            codeBlocks.forEach((pre) => {
                const copyButton = document.createElement('button');
                copyButton.className = 'copy-btn';
                copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                const code = pre.querySelector('code');
                const language = code.className.replace('language-', '') || 'code';
                const langLabel = document.createElement('span');
                langLabel.className = 'code-language';
                langLabel.textContent = language;
                pre.appendChild(langLabel);
                copyButton.addEventListener('click', () => {
                    const textToCopy = code.innerText;
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        copyButton.innerHTML = '<i class="fas fa-check"></i> 已复制';
                        copyButton.classList.add('success');
                        showToast('代码已复制到剪贴板', 'success');
                        setTimeout(() => {
                            copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                            copyButton.classList.remove('success');
                        }, 2000);
                    }).catch(err => {
                        console.error('复制失败:', err);
                        copyButton.innerHTML = '<i class="fas fa-times"></i> 失败';
                        copyButton.classList.add('error');
                        setTimeout(() => {
                            copyButton.innerHTML = '<i class="fas fa-copy"></i> 复制';
                            copyButton.classList.remove('error');
                        }, 2000);
                    });
                });
                pre.appendChild(copyButton);
            });
        }

        function handleImageClick(e) {
            const target = e.target;
            if (target.tagName === 'IMG' && target.closest('.article-full-content')) {
                const imgSrc = target.src;
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.src = imgSrc;
                lightbox.style.display = 'flex';
                document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
                lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
            }
            if (target.tagName === 'IMG' && target.closest('a') && target.closest('.article-full-content')) {
                e.preventDefault();
                const link = target.closest('a');
                showLinkConfirm(link.href);
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            hideLinkConfirm();
        }

        function showLinkConfirm(url) {
            const confirmEl = document.getElementById('link-confirm');
            const linkUrlEl = document.getElementById('link-url');
            linkUrlEl.textContent = url;
            linkUrlEl.href = url;
            confirmEl.style.display = 'block';
            setTimeout(() => { confirmEl.classList.add('show'); }, 10);
            document.getElementById('link-confirm-btn').onclick = function() {
                hideLinkConfirm();
                window.open(url, '_blank');
            };
        }

        function hideLinkConfirm() {
            const confirmEl = document.getElementById('link-confirm');
            confirmEl.classList.remove('show');
            setTimeout(() => { confirmEl.style.display = 'none'; }, 400);
        }

        function generateTOC() {
            const tocContainer = document.getElementById('toc-container');
            const tocList = document.getElementById('toc-list');
            const headings = document.querySelectorAll('.article-full-content h2, .article-full-content h3');
            if (headings.length === 0) {
                tocContainer.style.display = 'none';
                document.getElementById('toc-toggle').style.display = 'none';
                return;
            }
            if (window.innerWidth > 1024) tocContainer.style.display = 'block';
            tocList.innerHTML = '';
            headings.forEach((heading, index) => {
                if (!heading.id) heading.id = `heading-${index}`;
                const listItem = document.createElement('li');
                listItem.className = heading.tagName.toLowerCase() === 'h2' ? 'toc-h2' : 'toc-h3';
                listItem.dataset.id = heading.id;
                const link = document.createElement('a');
                link.href = `#${heading.id}`;
                link.textContent = heading.textContent;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetElement = document.getElementById(heading.id);
                    if (targetElement) {
                        const offsetTop = targetElement.offsetTop - 80;
                        window.scrollTo({ top: offsetTop, behavior: 'smooth' });
                    }
                    if (window.innerWidth <= 1024) tocContainer.style.display = 'none';
                });
                listItem.appendChild(link);
                tocList.appendChild(listItem);
            });
        }

        function handleScroll() {
            const backToTopBtn = document.getElementById('back-to-top');
            if (window.scrollY > 300) backToTopBtn.classList.add('visible');
            else backToTopBtn.classList.remove('visible');
            highlightTOC();
        }

        function highlightTOC() {
            const headings = document.querySelectorAll('.article-full-content h2, .article-full-content h3');
            const tocItems = document.querySelectorAll('.toc-list li');
            if (headings.length === 0) return;
            let currentHeading = null;
            const scrollPosition = window.scrollY + 100;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            const isAtBottom = windowHeight + window.scrollY >= documentHeight - 100;
            if (isAtBottom) {
                currentHeading = headings[headings.length - 1];
            } else {
                for (let i = 0; i < headings.length; i++) {
                    const heading = headings[i];
                    const headingTop = heading.offsetTop;
                    const headingBottom = headingTop + heading.offsetHeight;
                    if ((headingTop <= scrollPosition && headingBottom >= scrollPosition) ||
                        (i === headings.length - 1 && headingTop <= scrollPosition)) {
                        currentHeading = heading;
                        break;
                    }
                    if (headingTop > scrollPosition) {
                        currentHeading = headings[Math.max(0, i - 1)];
                        break;
                    }
                }
            }
            if (!currentHeading && headings.length > 0) currentHeading = headings[0];
            if (currentHeading) {
                tocItems.forEach(item => {
                    if (item.dataset.id === currentHeading.id) {
                        item.classList.add('active');
                        if (window.innerWidth > 1024) {
                            const tocContainer = document.getElementById('toc-container');
                            const itemTop = item.offsetTop;
                            const containerHeight = tocContainer.clientHeight;
                            const itemHeight = item.clientHeight;
                            if (itemTop < tocContainer.scrollTop || itemTop + itemHeight > tocContainer.scrollTop + containerHeight) {
                                tocContainer.scrollTop = itemTop - containerHeight / 2 + itemHeight / 2;
                            }
                        }
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        async function loadLicenseInfo() {
            try {
                const response = await axios.get('../articles.json', { timeout: 8000 });
                const articles = response.data;
                const currentPath = window.location.pathname;
                const filename = currentPath.split('/').pop();
                const slug = filename.replace(/\.html$/, '');
                const article = articles.find(a => {
                    const aFilename = a.filename.split('/').pop();
                    const aSlug = aFilename.replace(/\.md$/, '');
                    return aSlug === slug;
                });
                const footer = document.getElementById('article-footer');
                const licenseText = document.getElementById('license-text');
                if (article && article.category === 'friend_link') {
                    footer.style.display = 'none';
                    return;
                }
                if (article && article.license && article.license !== false) {
                    const license = article.license;
                    const licenseUrls = {
                        'CC BY': 'https://creativecommons.org/licenses/by/4.0/',
                        'CC BY-SA': 'https://creativecommons.org/licenses/by-sa/4.0/',
                        'CC BY-NC': 'https://creativecommons.org/licenses/by-nc/4.0/',
                        'CC BY-ND': 'https://creativecommons.org/licenses/by-nd/4.0/'
                    };
                    const url = licenseUrls[license] || '#';
                    licenseText.innerHTML = `本文遵循 <a href="${url}" target="_blank" rel="noopener noreferrer">${license} 4.0 国际许可协议</a>`;
                    footer.style.display = 'block';
                } else {
                    licenseText.innerHTML = '本文未使用任何知识共享协议';
                    footer.style.display = 'block';
                }
            } catch (error) {
                addLoadingError('协议信息加载失败');
                const footer = document.getElementById('article-footer');
                footer.style.display = 'none';
            }
        }

        async function loadPoetry() {
            const contentEl = document.getElementById('poetry-content');
            const authorEl = document.getElementById('poetry-author');
            try {
                contentEl.textContent = '加载中...';
                authorEl.textContent = '';
                const response = await axios.get('https://v1.jinrishici.com/all.json', { timeout: 8000 });
                const data = response.data;
                if (data && data.content) {
                    contentEl.textContent = data.content;
                    authorEl.textContent = `—— ${data.author}`;
                } else {
                    throw new Error('数据结构不符');
                }
            } catch (e) {
                contentEl.textContent = '加载失败';
                authorEl.textContent = '';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            updateLoadingProgress(10, '正在准备...');
            updateLoadingProgress(20, '正在加载壁纸...');

            let wallOk = false;
            try {
                wallOk = await loadWallpapers();
            } catch (e) {
                addLoadingError('壁纸加载失败');
            }
            updateLoadingProgress(55, wallOk ? '壁纸加载完成' : '使用默认壁纸...');
            if (!wallOk) {
                try {
                    wallOk = await setDefaultWallpaper();
                } catch (e) {
                    addLoadingError('壁纸加载失败');
                }
                if (!wallOk) {
                    addLoadingError('所有壁纸源均加载失败');
                }
            }

            updateLoadingProgress(70, '正在增强文章...');
            addCopyButtonsToCodeBlocks();
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            generateTOC();
            document.addEventListener('click', handleImageClick);
            window.addEventListener('scroll', handleScroll);
            document.getElementById('back-to-top').addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('toc-toggle').addEventListener('click', () => {
                const tocContainer = document.getElementById('toc-container');
                if (tocContainer.style.display === 'block') {
                    tocContainer.style.display = 'none';
                } else {
                    tocContainer.style.display = 'block';
                    highlightTOC();
                    const activeItem = document.querySelector('.toc-list li.active');
                    if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
            preventTocScrollPropagation();
            document.getElementById('link-cancel').addEventListener('click', hideLinkConfirm);

            updateLoadingProgress(85, '正在加载协议信息...');
            await loadWithTimeout(loadLicenseInfo(), 8000, '协议加载超时').catch(e => addLoadingError('协议信息加载失败'));

            loadPoetry();
            document.getElementById('poetry-refresh-btn').addEventListener('click', loadPoetry);

            hideLoadingOverlay();
            flushLoadingErrors();
        });
    </script>
</body>
</html>
