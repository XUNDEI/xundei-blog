<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xundei's blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js">
    </script>
    <style>
        /* ========== 原有样式保持不动 ========== */
        a {
            text-decoration: none;
            position: relative;
            color: #a1c4fd;
            transition: all 0.3s ease;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% 100%;
            background-position: 100% 0;
        }

        a:hover {
            background-position: 0 0;
            color: transparent;
        }

        a::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        a:hover::before {
            opacity: 1;
        }

        a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        footer a {
            display: inline-block;
            padding: 0 3px;
            margin: 0 2px;
            border-radius: 4px;
        }

        footer a:hover {
            background: rgba(162, 196, 253, 0.15);
            box-shadow: 0 0 8px rgba(162, 196, 253, 0.4);
        }

        .read-more {
            background: rgba(255, 255, 255, 0.1) !important;
            color: var(--light-text) !important;
            background-image: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            position: static !important;
        }

        .read-more:hover {
            background: var(--primary-color) !important;
            box-shadow: 0 0 10px var(--glow-color) !important;
        }

        .read-more::after,
        .read-more::before {
            content: none !important;
        }

        /* ========== 修复1：弹窗内阅读全文按钮文字消失问题 ========== */
        .modal-read-full {
            /* 覆盖全局 a 标签的渐变文字效果，保证文字始终可见 */
            background: var(--primary-color) !important;
            color: white !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            background-image: none !important;
            /* 取消可能的下划线效果 */
        }

        .modal-read-full:hover {
            background: #2b6de0 !important;
            color: white !important;
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(-2px);
        }

        /* 取消全局 a 对弹窗按钮的影响，包括伪元素 */
        .modal-read-full::before,
        .modal-read-full::after {
            content: none !important;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --primary-color: #4285F4;
            --text-color: #333;
            --light-text: #fff;
            --transition: all 0.3s ease;
            --blur-amount: 12px;
            --glow-color: rgba(66, 133, 244, 0.7);
            --scrollbar-width: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
            transition: background-image 1.5s ease-in-out;
            background-color: #121212;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Loading 弹窗样式 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-card {
            background: rgba(30, 60, 120, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(100, 160, 240, 0.45);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25), 0 0 30px rgba(66, 133, 244, 0.35);
            padding: 35px 30px 25px;
            width: 320px;
            max-width: 85vw;
            text-align: center;
            transition: all 0.3s ease;
            animation: loadingPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes loadingPopIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .loading-card .loader {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top: 4px solid #5badf5;
            border-right: 4px solid #3d8ef7;
            animation: spin 0.9s linear infinite;
            margin-bottom: 18px;
        }

        .loading-card .loading-text {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .loading-card .loading-subtext {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 18px;
            min-height: 18px;
        }

        .loading-progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3d8ef7, #5badf5, #7dc8f8);
            background-size: 200% 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progressShimmer 2s linear infinite;
            box-shadow: 0 0 12px rgba(66, 150, 244, 0.5);
        }

        @keyframes progressShimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            transition: var(--transition);
        }

        .glass:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), 0 0 20px var(--glow-color);
        }

        header {
            text-align: center;
            margin: 20px 0 40px;
            animation: fadeInDown 1s ease;
        }

        /* 标题故障效果 */
        .blog-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: -1px;
            position: relative;
        }

        .blog-title .highlight {
            background: linear-gradient(90deg,
                    #ff0000, #ff8800, #ffff00, #00cc00,
                    #0088ff, #6600ff, #cc00ff, #ff0044, #ff0000);
            background-size: 600% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-flow 3.5s linear infinite;
            display: inline;
        }

        @keyframes rainbow-flow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 600% 50%;
            }
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #1E90FF;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 #00BFFF;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(38px, 9999px, 34px, 0);

            5% {

            }

            }

            }

            }

            }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(12px, 9999px, 91px, 0);
            }
            5% {
                clip: rect(67px, 9999px, 24px, 0);
            }
            10% {
                clip: rect(34px, 9999px, 58px, 0);
            }
            15% {
                clip: rect(88px, 9999px, 15px, 0);
            }
            20% {
                clip: rect(42px, 9999px, 77px, 0);
            }
            25% {
                clip: rect(9px, 9999px, 36px, 0);
            }
            30% {
                clip: rect(55px, 9999px, 83px, 0);
            }
            35% {
                clip: rect(28px, 9999px, 46px, 0);
            }
            40% {
                clip: rect(73px, 9999px, 19px, 0);
            }
            45% {
                clip: rect(16px, 9999px, 62px, 0);
            }
            50% {
                clip: rect(94px, 9999px, 31px, 0);
            }
            55% {
                clip: rect(39px, 9999px, 85px, 0);
            }
            60% {
                clip: rect(82px, 9999px, 48px, 0);
            }
            65% {
                clip: rect(25px, 9999px, 71px, 0);
            }

                clip: rect(69px, 9999px, 14px, 0);
            }
            75% {
                clip: rect(46px, 9999px, 97px, 0);
            }
            80% {
                clip: rect(13px, 9999px, 52px, 0);
            }
            85% {
                clip: rect(59px, 9999px, 29px, 0);
            }
            90% {
                clip: rect(96px, 9999px, 66px, 0);
            }
            95% {
                clip: rect(31px, 9999px, 89px, 0);
            }
            100% {
                clip: rect(78px, 9999px, 41px, 0);
            }
        }

        .sentence {
            font-size: 1.4rem;
            font-weight: 300;
            font-style: italic;
            color: var(--light-text);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
        }

        .typewriter-cursor {
            display: inline-block;
            color: var(--light-text);
            font-weight: 300;
            margin-left: 2px;
            opacity: 1;
        }

        .typewriter-cursor.blink {
            animation: cursorBlink 0.9s infinite;
        }

        @keyframes cursorBlink {
            0%,
            50% {
                opacity: 1;
            }
            51%,
            100% {
                opacity: 0;
            }
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 1rem;
            color: var(--light-text);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 15px var(--glow-color);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .article-card {
            height: 320px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            overflow: hidden;
            cursor: pointer;
            position: relative; /* 为提示层定位 */
        }

        .article-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 20px var(--glow-color);
        }

        /* ========== 新增：卡片悬浮提示“查看详细” ========== */
        .card-hint {
            position: absolute;
            bottom: 50px; /* 位于阅读全文按钮上方 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            pointer-events: none; /* 不阻挡点击 */
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 5;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .article-card:hover .card-hint {
            opacity: 1;
        }

        .article-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--light-text);
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* ========== 修复2：文章介绍换行优化 ========== */
        .article-content {
            padding: 15px;
            flex-grow: 1;
            overflow: hidden;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-wrap: break-word;       /* 允许在单词内换行 */
            overflow-wrap: break-word;   /* 现代浏览器 */
            word-break: break-word;      /* 兼容性 */
        }

        .read-more {
            display: block;
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--light-text);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border-radius: 0 0 12px 12px;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .read-more:hover {
            background: var(--primary-color);
            box-shadow: 0 0 10px var(--glow-color);
        }

        /* 弹窗样式保持不变，仅修复按钮部分已在上方处理 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(30, 50, 100, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(100, 160, 240, 0.4);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), 0 0 30px var(--glow-color);
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            animation: modalPopIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPopIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--light-text);
            font-size: 1.2rem;
        }

        .modal-close-btn:hover {
            background: var(--primary-color);
            transform: rotate(90deg);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light-text);
            margin-bottom: 15px;
            word-break: break-word;
        }

        .modal-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .modal-excerpt {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
            font-size: 1rem;
            white-space: pre-wrap;
            margin-bottom: 25px;
        }

        /* modal-read-full 的样式已在上面覆盖，此处仅保留基础定义 */
        .modal-read-full {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            transition: var(--transition);
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }

        /* 其余原有样式 (about, func, toast, footer等) 保持不变 */
        .about-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: var(--transition);
        }

        .about-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .about-card {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 300px;
            z-index: 100;
            display: none;
            animation: popIn 0.4s ease;
        }

        .about-header {
            display: flex;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            justify-content: space-between;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            border: 2px solid white;
        }

        .about-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--light-text);
        }

        .contacts {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .contact-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin: 5px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .contact-tooltip {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 101;
        }

    <script>
        const luckMessages = {
            0: "Σ (・□・;)",
            100: "欧皇就是你辣(≧∀≦)ゞ",
            range: [
                { min: 1, max: 20, message: "运气不是很好呢(´･_･`)" },
                { min: 21, max: 44, message: "运气略差一点( ¯•ω•¯ )" },
                { min: 45, max: 55, message: "普普通通呢(´･ω･`)" },
                { min: 56, max: 69, message: "又是小幸运的一天~(,,・ω・,,)" },
                { min: 70, max: 89, message: "运气很好呢(๑•̀ㅂ•́)و✧" },
                { min: 90, max: 99, message: "离欧皇只差一点点啦ヽ( ^ω^ ゞ )" }
            ]
        };

        let articlesData = [];

        function updateLoadingProgress(percentage, subtext) {
            const progressBar = document.getElementById('loading-progress-bar');
            const subtextEl = document.getElementById('loading-subtext');
            if (progressBar) progressBar.style.width = percentage + '%';
            if (subtextEl && subtext) subtextEl.textContent = subtext;
        }

        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if (!overlay) return;
            updateLoadingProgress(100, '加载完成(ゝ∀･)b');
            setTimeout(() => {
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                }, 500);
            }, 350);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            updateLoadingProgress(8, '正在连接...');
            try {
                updateLoadingProgress(15, '正在获取文章列表...');
                const response = await fetch('./articles.json');
                if (!response.ok) throw new Error('文章列表加载失败');
                articlesData = await response.json();
                updateLoadingProgress(25, '文章列表已就绪');
            } catch (err) {
                console.error(err);
                showToast('文章列表加载失败，请刷新', 'error');
                articlesData = [];
                updateLoadingProgress(25, '文章列表加载失败，继续中...');
            }

            initFuncPanel();
            updateRuntime();
            setInterval(updateRuntime, 1000);
            await initializePage();
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const progress = document.createElement('div');
            progress.className = 'toast-progress';
            const msg = document.createElement('div');
            msg.textContent = message;
            toast.appendChild(progress);
            toast.appendChild(msg);
            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (container.contains(toast)) container.removeChild(toast);
                }, 400);
            }, 3000);
        }

        function updateRuntime() {
            const start = new Date('2025-07-12T11:04:41');
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('runtime-display').textContent = `${days}天${hours}时${minutes}分${seconds}秒`;
        }

        function initLuckResult() {
            const today = new Date().toDateString();
            const stored = localStorage.getItem('dailyLuck');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.date === today) {
                    displayLuckResult(data.value);
                    return;
                }
            }
            document.getElementById('luck-result').textContent = '?';
        }

        function getDailyLuck() {
            const today = new Date().toDateString();
            const stored = localStorage.getItem('dailyLuck');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.date === today) {
                    displayLuckResult(data.value);
                    return;
                }
            }
            const value = Math.floor(Math.random() * 101);
            localStorage.setItem('dailyLuck', JSON.stringify({ date: today, value }));
            displayLuckResult(value);
        }

        function displayLuckResult(value) {
            const resultEl = document.getElementById('luck-result');
            const messageEl = document.getElementById('luck-message');
            resultEl.textContent = value;
            resultEl.style.transform = 'scale(1.5)';
            setTimeout(() => resultEl.style.transform = 'scale(1)', 500);

            if (value === 0) messageEl.textContent = luckMessages[0];
            else if (value === 100) messageEl.textContent = luckMessages[100];
            else {
                for (const range of luckMessages.range) {
                    if (value >= range.min && value <= range.max) {
                        messageEl.textContent = range.message;
                        break;
                    }
                }
            }
        }

        function typeWriter(element, text, speed = 80) {
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            cursor.textContent = '|';
            element.appendChild(cursor);
            let i = 0;
            function type() {
                if (i < text.length) {
                    const char = text.charAt(i);
                    const node = document.createTextNode(char);
                    element.insertBefore(node, cursor);
                    i++;
                    const variation = Math.random() * 0.6 + 0.7;
                    setTimeout(type, speed * variation);
                } else {
                    cursor.classList.add('blink');
                }
            }
            type();
        }

        async function loadSentences() {
            const el = document.getElementById('sentence');
            try {
                const res = await axios.get('./sentences.txt');
                const sentences = res.data.split('\n').filter(line => line.trim());
                if (sentences.length) {
                    const random = sentences[Math.floor(Math.random() * sentences.length)];
                    typeWriter(el, random, 80);
                } else throw new Error('空文件');
            } catch (e) {
                console.error('加载美句失败:', e);
                el.style.display = 'none';
                showToast('美句加载失败', 'error');
            }
        }

        async function loadWallpapers() {
            try {
                const res = await axios.get('./wallpaper.json');
                const data = res.data;
                if (data && data.length) {
                    const entry = data[Math.floor(Math.random() * data.length)];
                    const path = entry.path + '?t=' + new Date().getTime();
                    return new Promise(resolve => {
                        const img = new Image();
                        img.onload = () => {
                            document.body.style.backgroundImage = `url(${path})`;
                            resolve(true);
                        };
                        img.onerror = () => resolve(false);
                        img.src = path;
                    });
                }
            } catch (e) {
                console.error('壁纸加载失败:', e);
            }
            return false;
        }

        async function setDefaultWallpaper() {
            try {
                const res = await axios.get('https://bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN');
                if (res.data.images?.[0]) {
                    document.body.style.backgroundImage = `url(https://bing.com${res.data.images[0].url})`;
                    return true;
                }
            } catch (e) {}
            document.body.style.backgroundImage = `url(https://www.yumus.cn/api/?target=img&brand=360&type=3)`;
            return false;
        }

        function initFuncPanel() {
            document.getElementById('func-btn').addEventListener('click', () => {
                const card = document.getElementById('func-card');
                card.style.display = card.style.display === 'block' ? 'none' : 'block';
                if (card.style.display === 'block' && !window.historyLoaded) loadHistoryToday();
            });
            document.getElementById('close-func-card').addEventListener('click', () => {
                document.getElementById('func-card').style.display = 'none';
            });
            document.getElementById('close-about-btn').addEventListener('click', () => {
                document.getElementById('about-card').style.display = 'none';
            });
            initLuckResult();
        }

        async function loadHistoryToday() {
            const el = document.getElementById('history-content');
            try {
                el.innerHTML = '<div class="history-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
                const api = 'https://cn.apihz.cn/api/zici/today.php?id=88888888&key=88888888';
                let data;
                if (typeof axios !== 'undefined') {
                    const res = await axios.get(api);
                    data = res.data;
                } else {
                    const res = await fetch(api);
                    data = await res.json();
                }
                if (JSON.stringify(data).toLowerCase().includes('www.apihz.cn') || 
                    (data.title && data.title.includes('www.apihz.cn'))) {
                    throw new Error('API负载过高');
                }
                if (data.code == 200) {
                    el.innerHTML = `<div class="history-date">${data.y}年${data.m}月${data.d}日</div><div class="history-event">${data.title}</div>`;
                } else throw new Error(data.msg || '未知错误');
                window.historyLoaded = true;
            } catch (e) {
                el.innerHTML = `<div class="history-error">加载失败: ${e.message}</div>`;
            }
        }

        async function initializePage() {
            try {
                updateLoadingProgress(30, '正在加载壁纸...');
                const wallOk = await loadWallpapers();
                updateLoadingProgress(60, wallOk ? '壁纸加载完成' : '使用默认壁纸...');
                if (!wallOk) {
                    await setDefaultWallpaper();
                    showToast('壁纸加载失败，使用默认壁纸', 'error');
                }
                updateLoadingProgress(75, '正在加载美句...');
                await loadSentences();
                updateLoadingProgress(88, '正在渲染文章...');
                renderArticles('all');
                updateLoadingProgress(95, '即将完成...');
                bindEvents();
                hideLoadingOverlay();
            } catch (e) {
                console.error(e);
                showToast('初始化失败: ' + e.message, 'error');
                hideLoadingOverlay();
            }
        }

        function getSlug(filename) {
            return filename.split('/').pop().replace(/\.md$/, '');
        }

        function openArticleModal(article) {
            const modal = document.getElementById('article-modal');
            document.getElementById('modal-title').textContent = article.title;
            document.getElementById('modal-date').textContent = article.date;
            document.getElementById('modal-category').textContent = getCategoryName(article.category);
            document.getElementById('modal-excerpt').textContent = article.excerpt;
            document.getElementById('modal-read-link').href = `/articles/${getSlug(article.filename)}.html`;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeArticleModal() {
            document.getElementById('article-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderArticles(category) {
            if (!articlesData) return;
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = '';

            let filtered = category === 'all' ? [...articlesData] : articlesData.filter(a => a.category === category);
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (!filtered.length) {
                grid.innerHTML = `<div class="glass" style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.8);"><i class="far fa-folder-open" style="font-size:3rem;margin-bottom:20px;"></i><h3>暂无文章</h3><p>该分类下还没有文章</p></div>`;
                return;
            }

            filtered.forEach(article => {
                const slug = getSlug(article.filename);
                const card = document.createElement('div');
                card.className = 'article-card glass';
                card.innerHTML = `
                    <div class="article-header">
                        <h3 class="article-title">${article.title}</h3>
                        <div class="article-meta">
                            <span>${article.date}</span>
                            <span>${getCategoryName(article.category)}</span>
                        </div>
                    </div>
                    <div class="article-content">${article.excerpt}</div>
                    <a href="/articles/${slug}.html" class="read-more">阅读全文</a>
                    <div class="card-hint">点击查看详细</div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.read-more')) return;
                    openArticleModal(article);
                });
                grid.appendChild(card);
            });

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
        }

        function getCategoryName(cat) {
            return { technology: '技术', diary: '日记', something: '杂碎' }[cat] || cat;
        }

        function bindEvents() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => renderArticles(btn.dataset.category));
            });

            document.getElementById('about-btn').addEventListener('click', () => {
                const card = document.getElementById('about-card');
                card.style.display = card.style.display === 'block' ? 'none' : 'block';
            });

            document.querySelectorAll('.contact-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    copyToClipboard(btn.dataset.value);
                    showToast('已复制到剪贴板', 'success');
                });
            });

            document.getElementById('article-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeArticleModal();
            });
            document.getElementById('modal-close-btn').addEventListener('click', closeArticleModal);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('article-modal').classList.contains('active')) {
                    closeArticleModal();
                }
            });

            document.addEventListener('click', (e) => {
                const about = document.getElementById('about-card');
                if (about.style.display === 'block' && !e.target.closest('#about-card') && !e.target.closest('#about-btn')) {
                    about.style.display = 'none';
                }
                const func = document.getElementById('func-card');
                if (func.style.display === 'block' && !e.target.closest('#func-card') && !e.target.closest('#func-btn')) {
                    func.style.display = 'none';
                }
            });

            document.getElementById('luck-btn')?.addEventListener('click', getDailyLuck);
        }

        function copyToClipboard(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
    </script>
</body>
</html>
