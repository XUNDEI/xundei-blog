        /* ========== 搜索按钮（右上角固定） ========== */
        .search-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            font-size: 1.1rem;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25), 0 0 0 0 rgba(66, 133, 244, 0);
            will-change: transform;
        }
        .search-toggle::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.4), rgba(91, 158, 245, 0.2), rgba(66, 133, 244, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .search-toggle:hover::before {
            opacity: 1;
        }
        .search-toggle:hover {
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.55), rgba(91, 158, 245, 0.35));
            border-color: rgba(66, 133, 244, 0.6);
            color: #fff;
            transform: scale(1.08);
            box-shadow: 0 8px 28px rgba(66, 133, 244, 0.45), 0 0 40px rgba(66, 133, 244, 0.15);
        }
        .search-toggle:active {
            transform: scale(0.92);
            transition-duration: 0.1s;
        }
        .search-toggle.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(66, 133, 244, 0.5);
            color: rgba(66, 133, 244, 0.9);
            transform: rotate(90deg) scale(0.95);
            box-shadow: 0 4px 18px rgba(66, 133, 244, 0.2);
        }
        .search-toggle .search-pulse {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid rgba(66, 133, 244, 0.25);
            animation: searchPulse 2.8s ease-in-out infinite;
            pointer-events: none;
            opacity: 0;
        }
        .search-toggle:hover .search-pulse {
            opacity: 1;
            border-color: rgba(66, 133, 244, 0.35);
        }
        @keyframes searchPulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* ========== 搜索面板 ========== */
        .search-panel {

    <div class="toast-container" id="toast-container"></div>

    <script>
        (function() {
            document.body.style.backgroundImage = 'linear-gradient(180deg, #87CEEB 0%, #ffffff 100%)';
            document.body.style.backgroundSize = 'cover';

            const luckMessages = {
                0: "Σ (・□・;)",
                100: "欧皇就是你辣(ゝ∀･)b",
                range: [
                    { min: 1, max: 20, message: "运气不是很好呢(´･_･`)" },
                    { min: 21, max: 44, message: "运气略差一点( ¯•ω•¯ )" },
                    { min: 45, max: 55, message: "普普通通呢(´･ω･`)" },
                    { min: 56, max: 69, message: "又是小幸运的一天~(,,・ω・,,)" },
                    { min: 70, max: 89, message: "运气很好呢(๑•̀ㅂ•́)و✧" },
                    { min: 90, max: 99, message: "离欧皇只差一点点啦ヽ( ^ω^ ゞ )" }
                ]
            };

            const WALLPAPER_TOTAL_TIMEOUT = 22000;
            const LOADING_MAX_DISPLAY = 10000;
            const IMG_TIMEOUT_B2 = 10000;
            const IMG_TIMEOUT_FALLBACK = 7000;
            const FETCH_TIMEOUT_CONFIG = 6000;
            const FETCH_TIMEOUT_BING = 8000;
            const FETCH_TIMEOUT_360 = 8000;

            let articlesData = [];
            const loadingErrors = [];
            const ARTICLES_PER_PAGE = 6;
            let currentCategory = 'all';
            let currentPage = 1;
            let currentSearchQuery = '';
            let currentTag = '';
            let loadingOverlayHidden = false;
            let wallpaperResolved = false;

            function updateLoadingProgress(percentage, subtext) {
                const progressBar = document.getElementById('loading-progress-bar');
                const subtextEl = document.getElementById('loading-subtext');
                if (progressBar) progressBar.style.width = Math.min(percentage, 100) + '%';
                if (subtextEl && subtext) subtextEl.textContent = subtext;
            }

            function hideLoadingOverlay() {
                if (loadingOverlayHidden) return;
                loadingOverlayHidden = true;
                const overlay = document.getElementById('loading-overlay');
                if (!overlay) return;
                updateLoadingProgress(100, '加载完成˶>ᗜ<˶');
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                }, 500);
            }

            function showToast(message, type) {
                type = type || 'info';
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast ' + type;
                const progress = document.createElement('div');
                progress.className = 'toast-progress';
                const msg = document.createElement('div');
                msg.textContent = message;
                toast.appendChild(progress);
                toast.appendChild(msg);
                container.appendChild(toast);
                requestAnimationFrame(function() { toast.classList.add('show'); });
                setTimeout(function() {
                    toast.classList.remove('show');
                    setTimeout(function() {
                        if (container.contains(toast)) container.removeChild(toast);
                    }, 400);
                }, 3000);
            }

            function flushLoadingErrors() {
                if (loadingErrors.length === 0) return;
                var unique = [];
                for (var i = 0; i < loadingErrors.length; i++) {
                    if (unique.indexOf(loadingErrors[i]) === -1) unique.push(loadingErrors[i]);
                }
                for (var j = 0; j < unique.length; j++) {
                    showToast(unique[j], 'error');
                }
                loadingErrors.length = 0;
            }

            function addLoadingError(msg) {
                loadingErrors.push(msg);
            }

            async function fetchWithTimeout(url, options, timeoutMs) {
                options = options || {};
                timeoutMs = timeoutMs || 12000;
                const controller = new AbortController();
                const timeoutId = setTimeout(function() { controller.abort(); }, timeoutMs);
                try {
                    const response = await fetch(url, Object.assign({}, options, { signal: controller.signal }));
                    clearTimeout(timeoutId);
                    return response;
                } catch (e) {
                    clearTimeout(timeoutId);
                    if (e.name === 'AbortError') throw new Error('请求超时');
                    throw e;
                }
            }

            function loadImageWithTimeout(imgUrl, timeoutMs) {
                return new Promise(function(resolve) {
                    var img = new Image();
                    var settled = false;
                    var timer = setTimeout(function() {
                        if (!settled && !img.complete) {
                            console.warn('图片加载超时:', imgUrl);
                        }
                        finish(img.naturalWidth > 0);
                    }, timeoutMs);

                    function finish(success) {
                        if (settled) return;
                        settled = true;
                        clearTimeout(timer);
                        if (success) {
                            document.body.style.backgroundImage = 'url(' + imgUrl + ')';
                        }
                        resolve(success);
                    }
                    img.onload = function() { finish(true); };
                    img.onerror = function() { finish(false); };
                    img.src = imgUrl;
                    if (img.complete) {
                        finish(img.naturalWidth > 0);
                    }
                });
            }

            function updateRuntime() {
                var start = new Date('2025-07-12T11:04:41');
                var now = new Date();
                var diff = now - start;
                var days = Math.floor(diff / (1000 * 60 * 60 * 24));
                var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((diff % (1000 * 60)) / 1000);
                var el = document.getElementById('runtime-display');
                if (el) el.textContent = days + '天' + hours + '时' + minutes + '分' + seconds + '秒';
            }

            function initLuckResult() {
                var today = new Date().toDateString();
                var stored = localStorage.getItem('dailyLuck');
                if (stored) {
                    var data = JSON.parse(stored);
                    if (data.date === today) {
                        displayLuckResult(data.value);
                        return;
                    }
                }
                var el = document.getElementById('luck-result');
                if (el) el.textContent = '?';
            }

            function getDailyLuck() {
                var today = new Date().toDateString();
                var stored = localStorage.getItem('dailyLuck');
                if (stored) {
                    var data = JSON.parse(stored);
                    if (data.date === today) {
                        displayLuckResult(data.value);
                        return;
                    }
                }
                var value = Math.floor(Math.random() * 101);
                localStorage.setItem('dailyLuck', JSON.stringify({ date: today, value: value }));
                displayLuckResult(value);
            }

            function displayLuckResult(value) {
                var resultEl = document.getElementById('luck-result');
                var messageEl = document.getElementById('luck-message');
                if (!resultEl) return;
                resultEl.textContent = value;
                resultEl.style.transform = 'scale(1.5)';
                setTimeout(function() { resultEl.style.transform = 'scale(1)'; }, 500);
                if (!messageEl) return;
                if (value === 0) messageEl.textContent = luckMessages[0];
                else if (value === 100) messageEl.textContent = luckMessages[100];
                else {
                    for (var i = 0; i < luckMessages.range.length; i++) {
                        var range = luckMessages.range[i];
                        if (value >= range.min && value <= range.max) {
                            messageEl.textContent = range.message;
                            break;
                        }
                    }
                }
            }

            function typeWriter(element, text, speed) {
                element.innerHTML = '';
                var wrapper = document.createElement('span');
                var textSpan = document.createElement('span');
                var cursor = document.createElement('span');
                cursor.className = 'typewriter-cursor';
                cursor.textContent = '|';
                wrapper.appendChild(textSpan);
                wrapper.appendChild(cursor);
                element.appendChild(wrapper);
                var i = 0;

                function type() {
                    if (i < text.length) {
                        textSpan.textContent += text.charAt(i);
                        i++;
                        var variation = Math.random() * 0.6 + 0.7;
                        setTimeout(type, speed * variation);
                    } else {
                        cursor.classList.add('blink');
                    }
                }
                type();
            }

            async function loadSentences() {
                var el = document.getElementById('sentence');
                try {
                    var res = await fetchWithTimeout('./sentences.txt', {}, 8000);
                    if (!res.ok) throw new Error('请求失败');
                    var text = await res.text();
                    var sentences = text.split('\n').filter(function(line) { return line.trim(); });
                    if (sentences.length) {
                        var random = sentences[Math.floor(Math.random() * sentences.length)];
                        typeWriter(el, random, 80);
                    } else throw new Error('空文件');
                } catch (e) {
                    console.error('加载美句失败:', e);
                    addLoadingError('美句加载失败');
                    el.style.display = 'none';
                }
            }

            async function loadWallpaperFromConfig() {
                try {
                    var res = await fetchWithTimeout('./wallpaper.json', {}, FETCH_TIMEOUT_CONFIG);
                    if (!res.ok) throw new Error('请求失败');
                    var data = await res.json();
                    if (data && data.length) {
                        var entry = data[Math.floor(Math.random() * data.length)];
                        var imgUrl = entry.path;
                        if (!/^https?:\/\//i.test(imgUrl)) {
                            imgUrl = './' + imgUrl;
                        }
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_B2);
                    }
                    return false;
                } catch (e) {
                    console.warn('壁纸配置加载失败:', e);
                    return false;
                }
            }

            async function loadBingWallpaper() {
                var proxyUrl = 'https://api.allorigins.win/raw?url=';
                var bingApiUrl = 'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN';
                try {
                    var response = await fetchWithTimeout(proxyUrl + encodeURIComponent(bingApiUrl), {}, FETCH_TIMEOUT_BING);
                    var data = await response.json();
                    if (data.images && data.images[0]) {
                        var imgUrl = 'https://www.bing.com' + data.images[0].url;
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_FALLBACK);
                    }
                    return false;
                } catch (error) {
                    console.warn('Bing 壁纸加载失败:', error);
                    return false;
                }
            }

            async function load360Wallpaper() {
                var url = 'https://mini.browser.360.cn/newtab/imgsx?tid=67&page=1';
                try {
                    var response = await fetchWithTimeout(url, {}, FETCH_TIMEOUT_360);
                    var data = await response.json();
                    if (data && data.data && data.data.length > 0) {
                        var randomIndex = Math.floor(Math.random() * data.data.length);
                        var imgUrl = data.data[randomIndex].url;
                        return await loadImageWithTimeout(imgUrl, IMG_TIMEOUT_FALLBACK);
                    }
                    return false;
                } catch (error) {
                    console.warn('360 壁纸加载失败:', error);
                    return false;
                }
            }

            async function loadWallpaperBackground() {
                if (wallpaperResolved) return;
                var deadline = Date.now() + WALLPAPER_TOTAL_TIMEOUT;
                var sources = [
                    { name: '本地配置', fn: loadWallpaperFromConfig },
                    { name: 'Bing', fn: loadBingWallpaper },
                    { name: '360', fn: load360Wallpaper }
                ];
                for (var i = 0; i < sources.length; i++) {
                    if (Date.now() >= deadline) break;
                    var remaining = deadline - Date.now();
                    try {
                        var raceResult = await Promise.race([
                            sources[i].fn(),
                            new Promise(function(resolve) { setTimeout(function() { resolve(false); }, remaining); })
                        ]);
                        if (raceResult === true) {
                            wallpaperResolved = true;
                            return true;
                        }
                    } catch (e) {
                        console.warn(sources[i].name + ' 壁纸源异常:', e);
                    }
                }
                wallpaperResolved = true;
                return false;
            }

            async function loadHistoryToday() {
                var el = document.getElementById('history-content');
                try {
                    el.innerHTML = '<div class="history-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
                    var api = 'https://v2.xxapi.cn/api/history';
                    var res = await fetchWithTimeout(api, {}, 10000);
                    if (!res.ok) throw new Error('接口响应异常');
                    var data = await res.json();
                    if (data && data.code === 200 && Array.isArray(data.data) && data.data.length > 0) {
                        var items = data.data;
                        var randomItem = items[Math.floor(Math.random() * items.length)];
                        var separatorIndex = randomItem.indexOf(' ');
                        var dateStr = '';
                        var eventStr = '';
                        if (separatorIndex !== -1) {
                            dateStr = randomItem.substring(0, separatorIndex);
                            eventStr = randomItem.substring(separatorIndex + 1);
                        } else {
                            dateStr = randomItem;
                            eventStr = '';
                        }
                        el.innerHTML = '<div class="history-date">' + dateStr + '</div><div class="history-event">' + eventStr + '</div>';
                    } else if (data && data.msg) {
                        throw new Error(data.msg);
                    } else {
                        throw new Error('未知错误');
                    }
                    window.historyLoaded = true;
                } catch (e) {
                    el.innerHTML = '<div class="history-error">加载失败: ' + e.message + '</div>';
                }
            }

            function loadContacts() {
                var container = document.getElementById('contacts-container');
                if (!container) return;
                var contacts = {
                    email: 'xundei_awa@outlook.com',
                    qq: '503275418',
                    wechat: 'xie503275418',
                    github: 'https://github.com/XUNDEI',
                    bilibili: 'https://space.bilibili.com/518218011'
                };
                var iconMap = {
                    email: { icon: 'fas fa-envelope', label: '邮箱' },
                    qq: { icon: 'fab fa-qq', label: 'QQ' },
                    github: { icon: 'fab fa-github', label: 'GitHub' },
                    wechat: { icon: 'fab fa-weixin', label: '微信' },
                    bilibili: { icon: 'fab fa-bilibili', label: 'B站' }
                };
                var html = '';
                var keys = Object.keys(contacts);

                    var icon = iconMap[key].icon;
                    var label = iconMap[key].label;

                }
                container.innerHTML = html;
                var btns = document.querySelectorAll('.contact-btn');
                for (var j = 0; j < btns.length; j++) {
                    btns[j].addEventListener('click', function() {
                        copyToClipboard(this.dataset.value);
                        showToast('已复制到剪贴板', 'success');
                    });
                }
            }

            function getSlug(filename) {
                return filename.split('/').pop().replace(/\.md$/, '');
            }

            function openArticleModal(article) {
                var modal = document.getElementById('article-modal');
                document.getElementById('modal-title').textContent = article.title;
                document.getElementById('modal-date').textContent = article.date;
                document.getElementById('modal-category').textContent = getCategoryName(article.category);
                document.getElementById('modal-excerpt').textContent = article.excerpt;
                var tagsEl = document.getElementById('modal-tags');
                if (article.tags) {
                    var tagArr = article.tags.split(', ');
                    var tagHtml = '';
                    for (var i = 0; i < tagArr.length; i++) {
                        var t = tagArr[i].trim();
                        if (!t) continue;
                        tagHtml += '<a href="/?tag=' + encodeURIComponent(t) + '" class="article-tag" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</a>';
                    }
                    tagsEl.innerHTML = tagHtml;
                } else {
                    tagsEl.innerHTML = '';
                }
                document.getElementById('modal-read-link').href = '/articles/' + getSlug(article.filename);
                var latestItem = document.getElementById('modal-latest-item');
                var latestEl = document.getElementById('modal-latest');
                if (article.latest) {
                    latestEl.textContent = formatRelativeTime(article.latest);
                    latestItem.style.display = '';
                } else {
                    latestItem.style.display = 'none';
                }
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeArticleModal() {
                document.getElementById('article-modal').classList.remove('active');
                document.body.style.overflow = '';
            }

            function formatRelativeTime(dateStr) {
                if (!dateStr) return '';
                var now = new Date();
                var date = new Date(dateStr);
                var diffMs = now - date;
                var diffMinutes = Math.floor(diffMs / 60000);
                var diffHours = Math.floor(diffMs / 3600000);
                var diffDays = Math.floor(diffMs / 86400000);
                if (diffMinutes < 1) return '刚刚';
                if (diffMinutes < 60) return diffMinutes + ' 分钟前';
                if (diffHours < 24) return diffHours + ' 小时前';
                if (diffDays <= 30) return diffDays + ' 天前';
                var y = date.getFullYear();
                var m = String(date.getMonth() + 1).padStart(2, '0');
                var d = String(date.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + d;
            }

            function getLatestSortKey(article) {
                return article.latest ? article.latest : article.date;
            }

            function getArticleTimestamp(article) {
                return Date.parse(article.date + 'T00:00:00');
            }

            function renderPagination(totalPages, page) {
                var container = document.getElementById('pagination-container');
                if (!container) return;
                container.innerHTML = '';
                if (totalPages <= 1) return;

                function createBtn(innerHTML, pageNum, disabled, active, isArrow) {
                    var btn = document.createElement('button');
                    btn.className = 'pagination-btn' + (active ? ' active' : '') + (isArrow ? ' pagination-arrow' : '');
                    btn.innerHTML = innerHTML;
                    if (disabled) btn.disabled = true;
                    else {
                        btn.addEventListener('click', function() {
                            currentPage = pageNum;
                            renderArticles();
                            var grid = document.getElementById('articles-grid');
                            if (grid) grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        });
                    }
                    return btn;
                }

                container.appendChild(createBtn('<i class="fas fa-chevron-left"></i>', page - 1, page <= 1, false, true));

                var startPage = Math.max(1, page - 2);
                var endPage = Math.min(totalPages, page + 2);
                if (endPage - startPage < 4) {
                    if (startPage === 1) endPage = Math.min(totalPages, startPage + 4);
                    else if (endPage === totalPages) startPage = Math.max(1, endPage - 4);
                }
                for (var i = startPage; i <= endPage; i++) {
                    container.appendChild(createBtn(String(i), i, false, i === page, false));
                }

                container.appendChild(createBtn('<i class="fas fa-chevron-right"></i>', page + 1, page >= totalPages, false, true));

                var jumpDiv = document.createElement('div');
                jumpDiv.className = 'page-jump';
                var input = document.createElement('input');
                input.type = 'number';
                input.min = 1;
                input.max = totalPages;
                input.className = 'page-jump-input';
                input.placeholder = '页';
                input.setAttribute('aria-label', '跳转到指定页');
                var jumpBtn = document.createElement('button');
                jumpBtn.className = 'page-jump-btn';
                jumpBtn.textContent = '跳转';
                jumpBtn.addEventListener('click', function() {
                    var p = parseInt(input.value);
                    if (isNaN(p) || p < 1) p = 1;
                    if (p > totalPages) p = totalPages;
                    currentPage = p;
                    renderArticles();
                    var grid = document.getElementById('articles-grid');
                    if (grid) grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') jumpBtn.click();
                });
                jumpDiv.appendChild(input);
                jumpDiv.appendChild(jumpBtn);
                container.appendChild(jumpDiv);
            }

            function renderTagsHtml(tagsStr) {
                if (!tagsStr) return '';
                var parts = tagsStr.split(', ');
                var html = '';
                for (var i = 0; i < parts.length; i++) {
                    var t = parts[i].trim();
                    if (!t) continue;
                    var active = (currentTag === t) ? ' tag-active' : '';
                    html += '<a href="/?tag=' + encodeURIComponent(t) + '" class="article-tag' + active + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</a>';
                }
                return html;
            }

            // ========== 核心修复：使用 forEach 避免闭包陷阱 ==========
            function renderArticles(category, searchQuery) {
                if (!articlesData) return;
                if (category !== undefined) {
                    currentCategory = category;
                    currentPage = 1;
                }
                var grid = document.getElementById('articles-grid');
                grid.innerHTML = '';

                var filtered = articlesData.slice();
                filtered = filtered.filter(function(a) { return a.category !== 'friend_link'; });

                if (currentCategory !== 'all') {
                    filtered = filtered.filter(function(a) { return a.category === currentCategory; });
                }

                var query = searchQuery !== undefined ? searchQuery : currentSearchQuery;
                if (query) {
                    var q = query.toLowerCase().trim();
                    filtered = filtered.filter(function(a) {
                        var searchInTitle = (a.title || '').toLowerCase().indexOf(q) !== -1;
                        var searchInExcerpt = (a.excerpt || '').toLowerCase().indexOf(q) !== -1;
                        var searchInTags = (a.tags || '').toLowerCase().indexOf(q) !== -1;
                        var searchInBody = (a.searchText || '').toLowerCase().indexOf(q) !== -1;
                        return searchInTitle || searchInExcerpt || searchInTags || searchInBody;
                    });
                }

                if (currentTag) {
                    filtered = filtered.filter(function(a) {
                        var tags = (a.tags || '').split(', ').map(function(t) { return t.trim(); });
                        return tags.indexOf(currentTag) !== -1;
                    });
                }

                filtered.sort(function(a, b) {
                    var keyA = getLatestSortKey(a);
                    var keyB = getLatestSortKey(b);
                    if (keyA && keyB) return keyB.localeCompare(keyA);
                    return getArticleTimestamp(b) - getArticleTimestamp(a);
                });

                var totalPages = Math.ceil(filtered.length / ARTICLES_PER_PAGE);
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * ARTICLES_PER_PAGE;
                var pageArticles = filtered.slice(start, start + ARTICLES_PER_PAGE);

                var searchInfo = document.getElementById('search-info');
                if (query || currentTag) {
                    var msg = '';
                    if (query && currentTag) {
                        msg = '搜索 "' + escapeHtml(query) + '" 和标签 "' + escapeHtml(currentTag) + '" 共 ' + filtered.length + ' 篇';
                    } else if (query) {
                        msg = '搜索 "' + escapeHtml(query) + '" 共 ' + filtered.length + ' 篇';
                    } else if (currentTag) {
                        msg = '标签 "' + escapeHtml(currentTag) + '" 共 ' + filtered.length + ' 篇';
                    }
                    searchInfo.textContent = msg;
                    searchInfo.classList.add('visible');
                } else {
                    searchInfo.classList.remove('visible');
                }

                if (!pageArticles.length) {
                    var emptyMsg = (query || currentTag) ? '没有找到匹配的文章' : '该分类下还没有文章';
                    grid.innerHTML = '<div class="glass" style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.8);"><i class="far fa-frown" style="font-size:3rem;margin-bottom:20px;"></i><h3>暂无结果</h3><p>' + emptyMsg + '</p></div>';
                    renderPagination(totalPages, currentPage);
                    updateCategoryButtons();
                    return;
                }

                // [FIX] 使用 forEach 替代 for 循环，确保每个回调捕获独立的 article
                pageArticles.forEach(function(article) {
                    var slug = getSlug(article.filename);
                    var card = document.createElement('div');
                    card.className = 'article-card glass';
                    var tagsHtml = renderTagsHtml(article.tags);
                    card.innerHTML = '<div class="article-header"><h3 class="article-title">' + escapeHtml(article.title) +
                        '</h3><div class="article-meta"><span>' + (article.latest ? article.latest.substring(0, 10) :
                            article.date) + '</span><span>' + getCategoryName(article.category) +
                        '</span></div>' + (tagsHtml ? '<div class="article-tags">' + tagsHtml + '</div>' : '') +
                        '</div><div class="article-content">' + escapeHtml(article.excerpt) +
                        '</div><a href="/articles/' + slug +
                        '" class="read-more">阅读全文</a><div class="card-hint">查看详细</div>';
                    card.addEventListener('click', function(e) {
                        if (e.target.closest('.read-more')) return;
                        if (e.target.closest('.article-tag')) return;
                        openArticleModal(article);  // 这里 article 是当前迭代的独立副本
                    });
                    grid.appendChild(card);
                });

                var tagLinks = grid.querySelectorAll('.article-tag');
                for (var j = 0; j < tagLinks.length; j++) {
                    tagLinks[j].addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var tagName = this.dataset.tag;
                        if (currentTag === tagName) {
                            currentTag = '';
                        } else {
                            currentTag = tagName;
                        }
                        if (currentTag) {
                            document.getElementById('search-input').value = '';
                            currentSearchQuery = '';
                        }
                        renderArticles('all');
                    });
                }

                renderPagination(totalPages, currentPage);
                updateCategoryButtons();
            }

            function updateCategoryButtons() {
                var btns = document.querySelectorAll('.category-btn');
                for (var i = 0; i < btns.length; i++) {
                    btns[i].classList.toggle('active', btns[i].dataset.category === currentCategory);
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) { return c; });
            }

            function getCategoryName(cat) {
                var map = { technology: '技术', diary: '日记', something: '杂碎', friend_link: '友链' };
                return map[cat] || cat;
            }

            function bindEvents() {
                var catBtns = document.querySelectorAll('.category-btn');
                for (var i = 0; i < catBtns.length; i++) {
                    catBtns[i].addEventListener('click', function() {
                        if (currentSearchQuery) {
                            document.getElementById('search-input').value = '';
                            currentSearchQuery = '';
                        }
                        currentTag = '';
                        renderArticles(this.dataset.category);
                    });
                }

                var searchToggle = document.getElementById('search-toggle');
                var searchPanel = document.getElementById('search-panel');
                var searchInput = document.getElementById('search-input');
                var searchClear = document.getElementById('search-clear');
                var searchTimer = null;

                function openSearch() {
                    searchPanel.classList.add('active');
                    searchToggle.classList.add('active');
                    setTimeout(function() { searchInput.focus(); }, 200);
                }

                function closeSearch() {
                    searchPanel.classList.remove('active');
                    searchToggle.classList.remove('active');
                    searchInput.blur();
                }

                function resetSearch() {
                    searchInput.value = '';
                    currentSearchQuery = '';
                    currentTag = '';
                    searchClear.classList.remove('visible');
                    renderArticles('all');
                }

                searchToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (searchPanel.classList.contains('active')) {
                        closeSearch();
                        resetSearch();
                    } else {
                        openSearch();
                    }
                });

                searchInput.addEventListener('input', function() {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(function() {
                        currentSearchQuery = searchInput.value.trim();
                        currentTag = '';
                        if (currentSearchQuery) {
                            searchClear.classList.add('visible');
                        } else {
                            searchClear.classList.remove('visible');
                        }
                        renderArticles('all', currentSearchQuery);
                    }, 250);
                });

                searchClear.addEventListener('click', function(e) {
                    e.stopPropagation();
                    resetSearch();
                    searchInput.focus();
                });

                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        resetSearch();
                        closeSearch();
                    }
                });

                document.getElementById('about-btn').addEventListener('click', function() {
                    var card = document.getElementById('about-card');
                    card.style.display = card.style.display === 'block' ? 'none' : 'block';
                });

                document.getElementById('article-modal').addEventListener('click', function(e) {
                    if (e.target === e.currentTarget) closeArticleModal();
                    var tagEl = e.target.closest('.article-tag');
                    if (tagEl) {
                        e.preventDefault();
                        var tagName = tagEl.dataset.tag;
                        if (tagName) {
                            closeArticleModal();
                            currentTag = tagName;
                            document.getElementById('search-input').value = '';
                            currentSearchQuery = '';
                            renderArticles('all');
                        }
                    }
                });
                document.getElementById('modal-close-btn').addEventListener('click', closeArticleModal);

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && document.getElementById('article-modal').classList.contains('active')) {
                        closeArticleModal();
                    }
                });

                document.addEventListener('click', function(e) {
                    var about = document.getElementById('about-card');
                    if (about.style.display === 'block' && !e.target.closest('#about-card') && !e.target.closest('#about-btn')) {
                        about.style.display = 'none';
                    }
                    var func = document.getElementById('func-card');
                    if (func.style.display === 'block' && !e.target.closest('#func-card') && !e.target.closest('#func-btn')) {
                        func.style.display = 'none';
                    }
                    if (searchPanel.classList.contains('active') &&
                        !e.target.closest('#search-panel') &&
                        !e.target.closest('#search-toggle')) {
                        closeSearch();
                        resetSearch();
                    }
                });

                var luckBtn = document.getElementById('luck-btn');
                if (luckBtn) luckBtn.addEventListener('click', getDailyLuck);

                var rssLink = document.getElementById('rss-link');
                if (rssLink) {
                    rssLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        var rssUrl = window.location.origin + '/rss.xml';
                        copyToClipboard(rssUrl);
                        showToast('RSS 链接已复制到剪贴板！', 'success');
                    });
                }
            }

            function copyToClipboard(text) {
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }

            async function initializePage() {
                var globalLoadTimer = setTimeout(function() {
                    if (!loadingOverlayHidden) {
                        updateLoadingProgress(95, '即将完成...');
                        hideLoadingOverlay();
                        flushLoadingErrors();
                    }
                }, LOADING_MAX_DISPLAY);

                try {
                    updateLoadingProgress(8, '正在初始化...');
                    articlesData = window.__ARTICLES__ || [];
                    updateLoadingProgress(20, articlesData.length ? '文章数据已就绪' : '无文章数据');

                    updateLoadingProgress(30, '正在渲染文章...');
                    var urlParams = new URLSearchParams(window.location.search);
                    var urlTag = urlParams.get('tag');
                    if (urlTag) {
                        currentTag = urlTag;
                    }
                    renderArticles('all');
                    updateLoadingProgress(55, '文章渲染完成');

                    updateLoadingProgress(60, '正在加载美句...');
                    await Promise.race([
                        loadSentences(),
                        new Promise(function(resolve) { setTimeout(resolve, 8000); })
                    ]).catch(function(e) { addLoadingError('美句加载失败'); });
                    updateLoadingProgress(80, '美句加载完成');

                    loadWallpaperBackground().then(function(ok) {
                        if (!ok) addLoadingError('壁纸加载失败，已使用天空渐变背景');
                    }).catch(function(e) {
                        console.warn('壁纸后台加载异常:', e);
                    });

                    updateLoadingProgress(92, '即将完成...');
                    bindEvents();
                    initLuckResult();
                    updateRuntime();
                    setInterval(updateRuntime, 1000);
                    loadContacts();

                    document.getElementById('func-btn').addEventListener('click', function() {
                        var card = document.getElementById('func-card');
                        card.style.display = card.style.display === 'block' ? 'none' : 'block';
                        if (card.style.display === 'block' && !window.historyLoaded) loadHistoryToday();
                    });
                    document.getElementById('close-func-card').addEventListener('click', function() {
                        document.getElementById('func-card').style.display = 'none';
                    });
                    document.getElementById('close-about-btn').addEventListener('click', function() {
                        document.getElementById('about-card').style.display = 'none';
                    });

                    updateLoadingProgress(100, '加载完成˶>ᗜ<˶');
                    hideLoadingOverlay();
                    flushLoadingErrors();
                    clearTimeout(globalLoadTimer);
                } catch (e) {
                    console.error(e);
                    showToast('初始化失败: ' + e.message, 'error');
                    hideLoadingOverlay();
                    flushLoadingErrors();
                    clearTimeout(globalLoadTimer);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializePage);
            } else {
                initializePage();
            }
        })();
    </script>
