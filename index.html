<!DOCTYPE html>

  <style>
    /* ========== 全局链接样式 ========== */
    a {
      text-decoration: none;
      position: relative;
      background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% 100%;
      background-position: 100% 0;
      transition: all 0.3s ease;
    }
    a:hover {
      background-position: 0 0;
      color: transparent;
    }
    a::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    a:hover::before {
      opacity: 1;
    }
    a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }
    footer a {
      display: inline-block;
      padding: 0 3px;
      margin: 0 2px;
      border-radius: 4px;
    }
    footer a:hover {
      background: rgba(162, 196, 253, 0.15);
      box-shadow: 0 0 8px rgba(162, 196, 253, 0.4);
    }

    /* ========== 阅读全文按钮覆盖全局a样式 ========== */
    .read-more {
      background: rgba(255, 255, 255, 0.1) !important;
      color: var(--light-text) !important;
      background-image: none !important;
      -webkit-background-clip: unset !important;
      background-clip: unset !important;
      position: static !important;
      transition: all 0.35s ease !important;
    }
    .read-more:hover {
      background: var(--primary-color) !important;
      box-shadow: 0 0 18px var(--glow-color), 0 0 36px rgba(66, 133, 244, 0.35) !important;
      color: #fff !important;
      letter-spacing: 1px;
    }
    .read-more::after,
    .read-more::before {
      content: none !important;
    }
    .modal-read-full {
      background: var(--primary-color) !important;
      color: white !important;
      -webkit-background-clip: unset !important;
      background-clip: unset !important;
      background-image: none !important;
      transition: all 0.35s ease !important;
    }
    .modal-read-full:hover {
      background: #2b6de0 !important;
      color: white !important;
      box-shadow: 0 0 24px var(--glow-color), 0 0 48px rgba(66, 133, 244, 0.4);
      transform: translateY(-2px);
      letter-spacing: 1px;
    }
    .modal-read-full::before,
    .modal-read-full::after {
      content: none !important;
    }

    /* ========== CSS 变量 ========== */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.2);
      --glass-border: rgba(255, 255, 255, 0.3);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --primary-color: #4285F4;
      --text-color: #333;
      --light-text: #fff;
      --transition: all 0.35s ease;
      --blur-amount: 12px;
      --glow-color: rgba(66, 133, 244, 0.7);
      --scrollbar-width: 10px;
      --glow-strong: 0 0 22px rgba(66, 133, 244, 0.55), 0 0 45px rgba(66, 133, 244, 0.3), 0 0 75px rgba(66, 133, 244, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: var(--text-color);
      position: relative;
      overflow-x: hidden;
      background-attachment: fixed;
      transition: background-image 1.5s ease-in-out;
      background-color: #121212;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    /* ========== Loading 弹窗 ========== */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
      opacity: 1;
    }
    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-overlay.hidden {
      display: none;
    }
    .loading-card {
      background: rgba(30, 60, 120, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 160, 240, 0.45);
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25), 0 0 30px rgba(66, 133, 244, 0.35);
      padding: 35px 30px 25px;
      width: 320px;
      max-width: 85vw;
      text-align: center;
      transition: all 0.3s ease;
      animation: loadingPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes loadingPopIn {
      from { opacity: 0; transform: translateY(30px) scale(0.85); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .loading-card .loader {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top: 4px solid #5badf5;
      border-right: 4px solid #3d8ef7;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }
    .loading-card .loading-text {
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .loading-card .loading-subtext {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      margin-bottom: 18px;
      min-height: 18px;
    }
    .loading-progress-container {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3d8ef7, #5badf5, #7dc8f8);
      background-size: 200% 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      animation: progressShimmer 2s linear infinite;
      box-shadow: 0 0 12px rgba(66, 150, 244, 0.5);
    }
    @keyframes progressShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ========== 容器 ========== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ========== 磨砂玻璃卡片 ========== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--glass-shadow);
      padding: 20px;
      transition: var(--transition);
    }
    .glass:hover {
      box-shadow: var(--glow-strong);
      border-color: rgba(255, 255, 255, 0.5);
    }

    /* ========== Header ========== */
    header {
      text-align: center;
      margin: 20px 0 40px;
      animation: fadeInDown 1s ease;
    }
    header.glass:hover {
      box-shadow: var(--glow-strong);
    }
    .blog-title {
      font-size: 3.5rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 15px;
      letter-spacing: -1px;
      position: relative;
    }
.blog-title .highlight {
  background: linear-gradient(90deg, #1E90FF, #00BFFF);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline;
}
    @keyframes rainbow-flow {
      0% { background-position: 0% 50%; }
      100% { background-position: 600% 50%; }
    }
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .glitch-text::before {

    }

      35% { clip: rect(28px, 9999px, 46px, 0); }

      45% { clip: rect(16px, 9999px, 62px, 0); }
      50% { clip: rect(94px, 9999px, 31px, 0); }
      55% { clip: rect(39px, 9999px, 85px, 0); }

    }
    .sentence {
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: var(--light-text);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      margin-bottom: 30px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
    }
    .typewriter-cursor {
      display: inline-block;
      color: var(--light-text);
      font-weight: 300;
      margin-left: 2px;
      opacity: 1;
    }
    .typewriter-cursor.blink {
      animation: cursorBlink 0.9s infinite;
    }
    @keyframes cursorBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .categories {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .category-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50px;
      padding: 12px 25px;
      font-size: 1rem;
      color: var(--light-text);
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(5px);
      font-weight: 600;
    }
    .category-btn:hover {
      background: var(--primary-color);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 18px var(--glow-color);
    }
    .category-btn.active {
      background: var(--primary-color);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 22px var(--glow-color);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }
    .article-card {
      height: 320px;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .article-card:hover {
      box-shadow: var(--glow-strong);
      border-color: rgba(255, 255, 255, 0.55);
    }
    .card-hint {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      padding: 6px 16px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 400;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 5;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      letter-spacing: 0.3px;
      transform: translateX(-50%) translateY(6px);
    }
    .article-card:hover .card-hint {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .article-header {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      transition: background 0.3s ease;
    }
    .article-card:hover .article-header {
      background: rgba(255, 255, 255, 0.04);
    }
    .article-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--light-text);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .article-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
    }
    .article-content {
      padding: 15px;
      flex-grow: 1;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      font-size: 0.95rem;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
      transition: color 0.3s ease;
    }
    .article-card:hover .article-content {

    }

    /* ========== 弹窗 - 透明磨砂玻璃风格 ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);

    }
    .modal-overlay.active {

    }
    .modal-content {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 22px;

    @keyframes modalPopIn {

    }

  <script>
    (function() {
      const luckMessages = {
        0: "Σ (・□・;)",
        100: "欧皇就是你辣(≧∀≦)ゞ",
        range: [
          { min: 1, max: 20, message: "运气不是很好呢(´･_･`)" },
          { min: 21, max: 44, message: "运气略差一点( ¯•ω•¯ )" },
          { min: 45, max: 55, message: "普普通通呢(´･ω･`)" },
          { min: 56, max: 69, message: "又是小幸运的一天~(,,・ω・,,)" },
          { min: 70, max: 89, message: "运气很好呢(๑•̀ㅂ•́)و✧" },
          { min: 90, max: 99, message: "离欧皇只差一点点啦ヽ( ^ω^ ゞ )" }
        ]
      };

      let articlesData = [];
      const loadingErrors = [];

      function updateLoadingProgress(percentage, subtext) {
        const progressBar = document.getElementById('loading-progress-bar');
        const subtextEl = document.getElementById('loading-subtext');
        if (progressBar) progressBar.style.width = percentage + '%';
        if (subtextEl && subtext) subtextEl.textContent = subtext;
      }

      function hideLoadingOverlay() {
        const overlay = document.getElementById('loading-overlay');
        if (!overlay) return;
        updateLoadingProgress(100, '加载完成(ゝ∀･)b');
        setTimeout(() => {
          overlay.classList.add('fade-out');
          setTimeout(() => {
            overlay.classList.add('hidden');
            overlay.style.display = 'none';
          }, 500);
        }, 350);
      }

      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const progress = document.createElement('div');
        progress.className = 'toast-progress';
        const msg = document.createElement('div');
        msg.textContent = message;
        toast.appendChild(progress);
        toast.appendChild(msg);
        container.appendChild(toast);

        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => {
            if (container.contains(toast)) container.removeChild(toast);
          }, 400);
        }, 3000);
      }

      function flushLoadingErrors() {
        if (loadingErrors.length === 0) return;
        const unique = [...new Set(loadingErrors)];
        unique.forEach(err => showToast(err, 'error'));
        loadingErrors.length = 0;
      }

      function addLoadingError(msg) {
        loadingErrors.push(msg);
      }

      function loadWithTimeout(promise, timeoutMs, errorMsg) {
        return Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(errorMsg)), timeoutMs))
        ]);
      }

      function updateRuntime() {
        const start = new Date('2025-07-12T11:04:41');
        const now = new Date();
        const diff = now - start;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById('runtime-display').textContent = `${days}天${hours}时${minutes}分${seconds}秒`;
      }

      function initLuckResult() {
        const today = new Date().toDateString();
        const stored = localStorage.getItem('dailyLuck');
        if (stored) {
          const data = JSON.parse(stored);
          if (data.date === today) {
            displayLuckResult(data.value);
            return;
          }
        }
        document.getElementById('luck-result').textContent = '?';
      }

      function getDailyLuck() {
        const today = new Date().toDateString();
        const stored = localStorage.getItem('dailyLuck');
        if (stored) {
          const data = JSON.parse(stored);
          if (data.date === today) {
            displayLuckResult(data.value);
            return;
          }
        }
        const value = Math.floor(Math.random() * 101);
        localStorage.setItem('dailyLuck', JSON.stringify({ date: today, value }));
        displayLuckResult(value);
      }

      function displayLuckResult(value) {
        const resultEl = document.getElementById('luck-result');
        const messageEl = document.getElementById('luck-message');
        resultEl.textContent = value;
        resultEl.style.transform = 'scale(1.5)';
        setTimeout(() => resultEl.style.transform = 'scale(1)', 500);

        if (value === 0) messageEl.textContent = luckMessages[0];
        else if (value === 100) messageEl.textContent = luckMessages[100];
        else {
          for (const range of luckMessages.range) {
            if (value >= range.min && value <= range.max) {
              messageEl.textContent = range.message;
              break;
            }
          }
        }
      }

      function typeWriter(element, text, speed = 80) {
        element.innerHTML = '';
        const wrapper = document.createElement('span');
        const textSpan = document.createElement('span');
        const cursor = document.createElement('span');
        cursor.className = 'typewriter-cursor';
        cursor.textContent = '|';
        wrapper.appendChild(textSpan);
        wrapper.appendChild(cursor);
        element.appendChild(wrapper);
        let i = 0;
        function type() {
          if (i < text.length) {
            textSpan.textContent += text.charAt(i);
            i++;
            const variation = Math.random() * 0.6 + 0.7;
            setTimeout(type, speed * variation);
          } else {
            cursor.classList.add('blink');
          }
        }
        type();
      }

      async function loadSentences() {
        const el = document.getElementById('sentence');
        try {
          const res = await axios.get('./sentences.txt', { timeout: 8000 });
          const sentences = res.data.split('\n').filter(line => line.trim());
          if (sentences.length) {
            const random = sentences[Math.floor(Math.random() * sentences.length)];
            typeWriter(el, random, 80);
          } else throw new Error('空文件');
        } catch (e) {
          console.error('加载美句失败:', e);
          addLoadingError('美句加载失败');
          el.style.display = 'none';
        }
      }

      async function loadWallpapers() {
        try {
          const res = await axios.get('./wallpaper.json', { timeout: 10000 });
          const data = res.data;
          if (data && data.length) {
            const entry = data[Math.floor(Math.random() * data.length)];
            const path = entry.path + '?t=' + new Date().getTime();
            return new Promise(resolve => {
              const img = new Image();
              img.onload = () => {
                document.body.style.backgroundImage = `url(${path})`;
                resolve(true);
              };
              img.onerror = () => resolve(false);
              img.src = path;
            });
          }
        } catch (e) {
          console.error('壁纸加载失败:', e);
        }
        return false;
      }

      async function setDefaultWallpaper() {
        const bingApis = [
          'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN',
          'https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1',
          'https://bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN'
        ];

        for (const api of bingApis) {
          try {
            const res = await axios.get(api, { timeout: 8000 });
            if (res.data && res.data.images && res.data.images[0]) {
              const imgUrl = 'https://www.bing.com' + res.data.images[0].url;
              document.body.style.backgroundImage = `url(${imgUrl})`;
              return true;
            }
          } catch (e) {
            continue;
          }
        }

        try {
          await axios.get('https://api.dujin.org/bing/1920.php', {
            timeout: 8000,
            responseType: 'text'
          });
          document.body.style.backgroundImage = `url(https://api.dujin.org/bing/1920.php)`;
          return true;
        } catch (e) {}

        document.body.style.backgroundImage = `url(https://www.yumus.cn/api/?target=img&brand=360&type=3)`;
        return false;
      }

      async function loadHistoryToday() {
        const el = document.getElementById('history-content');
        try {
          el.innerHTML = '<div class="history-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
          const api = 'https://v2.xxapi.cn/api/history';
          let data;
          if (typeof axios !== 'undefined') {
            const res = await axios.get(api, { timeout: 10000 });
            data = res.data;
          } else {
            const res = await fetch(api);
            data = await res.json();
          }
          if (data && data.code === 200 && Array.isArray(data.data) && data.data.length > 0) {
            const items = data.data;
            const randomItem = items[Math.floor(Math.random() * items.length)];
            const separatorIndex = randomItem.indexOf(' ');
            let dateStr = '';
            let eventStr = '';
            if (separatorIndex !== -1) {
              dateStr = randomItem.substring(0, separatorIndex);
              eventStr = randomItem.substring(separatorIndex + 1);
            } else {
              dateStr = randomItem;
              eventStr = '';
            }
            el.innerHTML = `<div class="history-date">${dateStr}</div><div class="history-event">${eventStr}</div>`;
          } else if (data && data.msg) {
            throw new Error(data.msg);
          } else {
            throw new Error('未知错误');
          }
          window.historyLoaded = true;
        } catch (e) {
          el.innerHTML = `<div class="history-error">加载失败: ${e.message}</div>`;
        }
      }

      async function loadContacts() {
        const container = document.getElementById('contacts-container');
        if (!container) return;
        try {
          const res = await fetch('/api/contacts');
          if (!res.ok) throw new Error('获取联系方式失败');
          const contacts = await res.json();
          const iconMap = {
            email: { icon: 'fas fa-envelope', label: '邮箱' },
            qq: { icon: 'fab fa-qq', label: 'QQ' },
            github: { icon: 'fab fa-github', label: 'GitHub' },
            wechat: { icon: 'fab fa-weixin', label: '微信' },
            bilibili: { icon: 'fab fa-bilibili', label: 'B站' }
          };
          let html = '';
          for (const [key, value] of Object.entries(contacts)) {
            if (!value || !iconMap[key]) continue;
            const { icon, label } = iconMap[key];
            html += `
              <div class="contact-btn" data-contact="${key}" data-value="${value}">
                <i class="${icon}"></i>
                <div class="contact-tooltip">${label}</div>
              </div>
            `;
          }
          container.innerHTML = html || '<p style="color:rgba(255,255,255,0.5);text-align:center;">暂无联系方式</p>';
          document.querySelectorAll('.contact-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              copyToClipboard(btn.dataset.value);
              showToast('已复制到剪贴板', 'success');
            });
          });
        } catch (e) {
          console.error('联系方式加载失败:', e);
          container.innerHTML = '<p style="color:rgba(255,255,255,0.5);text-align:center;">联系方式暂不可用</p>';
        }
      }

      function getSlug(filename) {
        return filename.split('/').pop().replace(/\.md$/, '');
      }

      function openArticleModal(article) {
        const modal = document.getElementById('article-modal');
        document.getElementById('modal-title').textContent = article.title;
        document.getElementById('modal-date').textContent = article.date;
        document.getElementById('modal-category').textContent = getCategoryName(article.category);
        document.getElementById('modal-excerpt').textContent = article.excerpt;
        document.getElementById('modal-read-link').href = `/articles/${getSlug(article.filename)}.html`;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeArticleModal() {
        document.getElementById('article-modal').classList.remove('active');
        document.body.style.overflow = '';
      }

      // 获取文章排序时间戳（优先使用datetime字段，支持精确到时分秒排序）
      function getArticleTimestamp(article) {
        if (article.datetime) {
          const ts = Date.parse(article.datetime);
          if (!isNaN(ts)) return ts;
        }
        // 降级：使用date字段并设为当天00:00:00，保持同一天文章按原始顺序
        return Date.parse(article.date + 'T00:00:00');
      }

      // 修改：始终过滤掉 friend_link 分类的文章
      function renderArticles(category) {
        if (!articlesData) return;
        const grid = document.getElementById('articles-grid');
        grid.innerHTML = '';

        let filtered = [...articlesData];
        // 永远排除友链分类
        filtered = filtered.filter(a => a.category !== 'friend_link');
        if (category !== 'all') {
          filtered = filtered.filter(a => a.category === category);
        }
        
        // 核心排序：按时间戳倒序（最新在前），精确到时分秒
        filtered.sort((a, b) => getArticleTimestamp(b) - getArticleTimestamp(a));

        if (!filtered.length) {
          grid.innerHTML = `<div class="glass" style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.8);"><i class="far fa-folder-open" style="font-size:3rem;margin-bottom:20px;"></i><h3>暂无文章</h3><p>该分类下还没有文章</p></div>`;
          return;
        }

        filtered.forEach(article => {
          const slug = getSlug(article.filename);
          const card = document.createElement('div');
          card.className = 'article-card glass';
          card.innerHTML = `
            <div class="article-header">
              <h3 class="article-title">${escapeHtml(article.title)}</h3>
              <div class="article-meta">
                <span>${article.date}</span>
                <span>${getCategoryName(article.category)}</span>
              </div>
            </div>
            <div class="article-content">${escapeHtml(article.excerpt)}</div>
            <a href="/articles/${slug}.html" class="read-more">阅读全文</a>
            <div class="card-hint">查看详细</div>
          `;
          card.addEventListener('click', (e) => {
            if (e.target.closest('.read-more')) return;
            openArticleModal(article);
          });
          grid.appendChild(card);
        });

        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.category === category);
        });
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
          return c;
        });
      }

      function getCategoryName(cat) {
        const map = { technology: '技术', diary: '日记', something: '杂碎', friend_link: '友链' };
        return map[cat] || cat;
      }

      function bindEvents() {
        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.addEventListener('click', () => renderArticles(btn.dataset.category));
        });

        document.getElementById('about-btn').addEventListener('click', () => {
          const card = document.getElementById('about-card');
          card.style.display = card.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('article-modal').addEventListener('click', (e) => {
          if (e.target === e.currentTarget) closeArticleModal();
        });
        document.getElementById('modal-close-btn').addEventListener('click', closeArticleModal);

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && document.getElementById('article-modal').classList.contains('active')) {
            closeArticleModal();
          }
        });

        document.addEventListener('click', (e) => {
          const about = document.getElementById('about-card');
          if (about.style.display === 'block' && !e.target.closest('#about-card') && !e.target.closest('#about-btn')) {
            about.style.display = 'none';
          }
          const func = document.getElementById('func-card');
          if (func.style.display === 'block' && !e.target.closest('#func-card') && !e.target.closest('#func-btn')) {
            func.style.display = 'none';
          }
        });

        document.getElementById('luck-btn')?.addEventListener('click', getDailyLuck);
      }

      function copyToClipboard(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      async function initializePage() {
        try {
          updateLoadingProgress(8, '正在连接...');
          const articlesPromise = (async () => {
            try {
              const res = await loadWithTimeout(
                fetch('./articles.json').then(r => { if (!r.ok) throw new Error('文章列表加载失败'); return r.json(); }),
                12000,
                '文章列表加载超时'
              );
              articlesData = res;
              updateLoadingProgress(25, '文章列表已就绪');
            } catch (e) {
              addLoadingError('文章列表加载失败: ' + e.message);
              articlesData = [];
              updateLoadingProgress(25, '文章列表加载失败，继续中...');
            }
          })();

          await articlesPromise;

          updateLoadingProgress(30, '正在加载壁纸...');
          let wallOk = false;
          try {
            wallOk = await loadWithTimeout(loadWallpapers(), 12000, '壁纸加载超时');
          } catch (e) {
            addLoadingError('壁纸加载失败');
          }
          updateLoadingProgress(60, wallOk ? '壁纸加载完成' : '使用Bing壁纸...');
          if (!wallOk) {
            try {
              const bingOk = await loadWithTimeout(setDefaultWallpaper(), 10000, 'Bing壁纸加载超时');
              if (!bingOk) addLoadingError('壁纸加载失败，使用默认壁纸');
            } catch (e) {
              addLoadingError('壁纸加载失败');
            }
          }

          updateLoadingProgress(75, '正在加载美句...');
          await loadWithTimeout(loadSentences(), 10000, '美句加载超时').catch(e => addLoadingError('美句加载失败'));
          updateLoadingProgress(88, '正在渲染文章...');
          renderArticles('all');
          updateLoadingProgress(95, '即将完成...');
          bindEvents();
          initLuckResult();
          updateRuntime();
          setInterval(updateRuntime, 1000);
          loadContacts();

          document.getElementById('func-btn').addEventListener('click', () => {
            const card = document.getElementById('func-card');
            card.style.display = card.style.display === 'block' ? 'none' : 'block';
            if (card.style.display === 'block' && !window.historyLoaded) loadHistoryToday();
          });
          document.getElementById('close-func-card').addEventListener('click', () => {
            document.getElementById('func-card').style.display = 'none';
          });
          document.getElementById('close-about-btn').addEventListener('click', () => {
            document.getElementById('about-card').style.display = 'none';
          });

          hideLoadingOverlay();
          flushLoadingErrors();
        } catch (e) {
          console.error(e);
          showToast('初始化失败: ' + e.message, 'error');
          hideLoadingOverlay();
          flushLoadingErrors();
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializePage);
      } else {
        initializePage();
      }
    })();
  </script>
